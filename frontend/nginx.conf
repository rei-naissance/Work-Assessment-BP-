# nginx config for BinderPro frontend.
#
# Used by frontend/Dockerfile for containerized deployments.
# For bare-metal / non-Docker use, make two changes before enabling:
#
#   1. proxy_pass: change `http://backend:7691` → `http://localhost:7691`
#      (or your actual backend host — `backend` is a Docker Compose service name)
#
#   2. root: change `/usr/share/nginx/html` → absolute path to frontend/dist
#      e.g. /home/youruser/BinderPro/frontend/dist
#
# See docs/ARCHITECTURE.md → Deployment for step-by-step instructions.

server {
    listen       7680;
    server_name  _;
    root         /usr/share/nginx/html;  # CHANGE for bare-metal: absolute path to frontend/dist
    index        index.html;

    # Gzip compression for text assets
    gzip             on;
    gzip_types       text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length  256;

    # Security headers (belt-and-suspenders — backend also sets these for /api)
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"          always;
    add_header Referrer-Policy         "no-referrer"   always;

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to the backend
    # CHANGE for bare-metal: replace `backend` with `localhost` (or actual host)
    location /api/ {
        proxy_pass         http://backend:7691;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }
}
