  # ============================================================
  # HOME & ACCESS
  # ============================================================
  HOME_ADDRESS:
    category: home_access
    label: "Home Address"
    hint: "Your full street address including city, state, and ZIP."
    profile_path: "home_identity.address_line1"

  HOME_NICKNAME:
    category: home_access
    label: "Home Nickname"
    hint: "A friendly name for your home (e.g., 'The Lake House')."
    profile_path: "home_identity.home_nickname"

  WATER_SHUTOFF_LOCATION:
    category: home_access
    label: "Main Water Shutoff Location"
    hint: "Usually near the street-side foundation wall, basement utility area, or garage. Look for a valve on the main water line entering the house."
    profile_path: "critical_locations.water_shutoff.location"

  GAS_SHUTOFF_LOCATION:
    category: home_access
    label: "Gas Shutoff Location"
    hint: "Typically at the gas meter (exterior) or where gas line enters the house. Look for a valve requiring a wrench to turn."
    profile_path: "critical_locations.gas_shutoff.location"

  ELECTRICAL_PANEL_LOCATION:
    category: home_access
    label: "Electrical Panel Location"
    hint: "Often in garage, utility closet, basement, or exterior wall. It's the gray metal box with circuit breakers."
    profile_path: "critical_locations.electrical_panel.location"

  HVAC_UNIT_LOCATION:
    category: home_access
    label: "HVAC Unit Location"
    hint: "Indoor unit often in attic, basement, or utility closet. Outdoor unit (condenser) typically on side or back of house."
    profile_path: "critical_locations.hvac_unit.location"

  SUMP_PUMP_LOCATION:
    category: home_access
    label: "Sump Pump Location"
    hint: "Usually in the lowest part of the basement or crawlspace, in a pit or basin."
    profile_path: "critical_locations.sump_pump.location"

  ATTIC_ACCESS_LOCATION:
    category: home_access
    label: "Attic Access Location"
    hint: "Look for a pull-down ladder or hatch in a hallway ceiling, closet, or garage."
    profile_path: "critical_locations.attic_access.location"

  CRAWLSPACE_ACCESS_LOCATION:
    category: home_access
    label: "Crawlspace Access Location"
    hint: "Often an exterior hatch, interior floor hatch, or access panel in a closet."
    profile_path: "critical_locations.crawlspace_access.location"

