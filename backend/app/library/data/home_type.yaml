apartment_renter:
  title: "Apartment & Renter Essentials"
  home_type: apartment
  section: 5
  category: home_type
  overview: "Renters have rights and responsibilities. Documenting conditions, understanding your lease, and maintaining communication with management protects you."

  your_lease_info:
    property_manager: "[PROPERTY_MANAGER_NAME]"
    contact: "[PROPERTY_MANAGER_PHONE]"
    emergency_maintenance: "[EMERGENCY_MAINTENANCE_PHONE]"
    lease_end_date: "[LEASE_END_DATE]"
    rent_due_date: "[RENT_DUE_DATE]"
    portal: "[TENANT_PORTAL_URL]"

  move_in_documentation:
    critical:
      - "Complete written move-in inspection with management"
      - "Photograph EVERYTHING before moving items in"
      - "Note existing damage on inspection form"
      - "Keep copies of all documentation"
    photograph:
      - "Every room (multiple angles)"
      - "All appliances"
      - "Floors, walls, ceilings"
      - "Windows and blinds"
      - "Bathroom fixtures"
      - "Existing stains, dents, scratches"
      - "Exterior areas (balcony, patio)"
    storage: "Keep photos with date stamps, backup to cloud"

  renters_insurance:
    why_essential:
      - "Landlord's insurance does NOT cover your belongings"
      - "Covers theft, fire, water damage to your property"
      - "Provides liability coverage"
      - "Often required by lease"
    typical_coverage:
      - "Personal property: $20,000-50,000"
      - "Liability: $100,000-300,000"
      - "Additional living expenses if displaced"
    cost: "Typically $15-30/month"
    your_policy: "[RENTERS_INSURANCE_PROVIDER] — [RENTERS_POLICY_NUMBER]"

  maintenance_requests:
    your_responsibilities:
      - "Keep unit reasonably clean"
      - "Replace batteries (smoke detectors, remotes)"
      - "Replace light bulbs"
      - "Unclog minor drain blockages"
      - "Replace HVAC filter (some leases)"
      - "Report problems promptly"
    landlord_responsibilities:
      - "Maintain habitable condition"
      - "Working plumbing, heating, electrical"
      - "Structural repairs"
      - "Appliance repairs (if provided)"
      - "Pest control (varies by state)"
    how_to_request:
      - "1. Submit written request through official channel"
      - "2. Keep copy with date"
      - "3. Follow up if not addressed"
      - "4. Document any damage from delayed repairs"
    emergency_vs_routine:
      emergency: "No water, no heat, gas leak, flooding, fire damage, security breach"
      routine: "Dripping faucet, running toilet, appliance issue"

  know_your_rights:
    typical_rights:
      - "Quiet enjoyment of unit"
      - "Working utilities and systems"
      - "Proper notice before landlord entry (24-48 hours typical)"
      - "Security deposit return (timeline varies by state)"
      - "Protection from retaliation"
    varies_by_state: "Check local tenant rights laws"
    resources: "Local tenant rights organization, housing authority"

  building_safety:
    know:
      - "Fire exit locations"
      - "Fire extinguisher locations"
      - "Assembly point after evacuation"
      - "Emergency contact numbers"
    fire_safety:
      - "Know two ways out of building"
      - "Don't block exits or stairwells"
      - "Test smoke detectors monthly"
      - "Have fire extinguisher (optional but smart)"

  move_out_checklist:
    give_proper_notice:
      - "Check lease for notice requirement (typically 30-60 days)"
      - "Submit notice in writing"
      - "Keep proof of delivery"
    before_leaving:
      - "Clean thoroughly"
      - "Remove all belongings"
      - "Repair minor damage (nail holes, etc.)"
      - "Return all keys"
      - "Document condition with photos"
      - "Request walk-through inspection"
    deposit_return:
      - "Know your state's timeline for return"
      - "Provide forwarding address in writing"
      - "Request itemized deduction list if not returned in full"

