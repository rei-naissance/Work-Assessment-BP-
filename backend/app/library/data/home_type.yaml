      - "Rear yard/patio (if fee simple)"
      - "Windows and doors (verify with docs)"
    typically_hoa:
      - "Roof"
      - "Front exterior"
      - "Common areas"
      - "Shared driveways"
    verify: "Check CC&Rs for your specific community"

  shared_elements:
    driveways:
      - "Coordinate maintenance with neighbors"
      - "Share cost of repairs fairly"
      - "Don't block neighbor's access"
    fences:
      - "Determine ownership before repairs"
      - "Communicate before making changes"
      - "Split costs if jointly owned"
    landscaping:
      - "Stay within property lines"
      - "Consider impact on neighbors"
      - "Follow HOA guidelines"

  neighbor_relations:
    best_practices:
      - "Introduce yourself to adjacent neighbors"
      - "Exchange contact information"
      - "Communicate before noisy projects"
      - "Respect quiet hours"
      - "Address issues directly and respectfully first"
    if_issues_arise:
      - "Document the problem"
      - "Discuss directly with neighbor"
      - "If unresolved, involve HOA"
      - "Mediation before legal action"

  modifications:
    before_any_work:
      - "Check CC&Rs for restrictions"
      - "Submit architectural request if required"
      - "Determine if work affects shared walls"
      - "Notify neighbors if work will impact them"
    common_restrictions:
      - "Exterior paint colors"
      - "Fencing style and location"
      - "Landscaping changes"
      - "Satellite dish placement"

