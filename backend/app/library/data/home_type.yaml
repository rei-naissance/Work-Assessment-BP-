condo_association:
  title: "Condo & HOA Living Guide"
  home_type: condo
  section: 5
  category: home_type
  overview: "Condo ownership means shared responsibility with the HOA. Understanding what you own vs. what the association maintains prevents gaps in maintenance and insurance."

  your_association:
    name: "[HOA_NAME]"
    management_company: "[MANAGEMENT_COMPANY]"
    contact: "[HOA_CONTACT_PHONE]"
    portal: "[HOA_PORTAL_URL]"
    monthly_dues: "[HOA_DUES_AMOUNT]"
    dues_due_date: "[DUES_DUE_DATE]"

  ownership_boundaries:
    you_typically_own:
      - "Interior walls, flooring, ceilings (from studs/joists in)"
      - "Interior fixtures (cabinets, appliances, counters)"
      - "HVAC equipment inside your unit"
      - "Windows and doors (check your documents)"
      - "Plumbing from unit shutoff valve in"
      - "Electrical from unit panel in"
    association_typically_owns:
      - "Building exterior (roof, siding, structure)"
      - "Common areas (hallways, lobby, amenities)"
      - "Shared systems (elevators, main plumbing, fire suppression)"
      - "Landscaping and grounds"
      - "Parking structures"
    varies_by_condo:
      - "Windows and sliding doors"
      - "Balconies and patios"
      - "HVAC equipment"
      - "Limited common elements (assigned parking, storage)"
    verify: "Check your CC&Rs and bylaws for your specific community"

  insurance_requirements:
    master_policy:
      - "Covers building structure and common areas"
      - "Check what's included: 'bare walls in' vs 'all in'"
      - "Review certificate annually"
    your_policy_must_cover:
      - "Personal property (furniture, belongings)"
      - "Interior improvements and betterments"
      - "Liability (someone injured in your unit)"
      - "Loss assessment (your share of deductible/uninsured loss)"
      - "Gap coverage if master policy is 'bare walls'"
    policy_holder: "[CONDO_INSURANCE_PROVIDER]"
    policy_number: "[CONDO_INSURANCE_POLICY]"

  maintenance_responsibilities:
    your_unit:
      - "HVAC filter changes and service"
      - "Smoke and CO detector testing"
      - "Plumbing fixtures maintenance"
      - "Appliance maintenance"
      - "Interior cleaning and upkeep"
      - "Fireplace maintenance (if applicable)"
    report_to_hoa:
      - "Roof leaks or exterior damage"
      - "Common area maintenance issues"
      - "Pest problems in common areas"
      - "Safety hazards"
      - "Noise violations"
    how_to_report: "[HOA_MAINTENANCE_REQUEST_PROCESS]"

  governing_documents:
    know_these:
      - "CC&Rs (Covenants, Conditions & Restrictions)"
      - "Bylaws"
      - "Rules and Regulations"
      - "Architectural Guidelines"
    common_restrictions:
      - "Exterior modifications (including window treatments)"
      - "Pet policies (type, size, number)"
      - "Rental restrictions"
      - "Noise policies"
      - "Parking rules"
    before_any_changes: "Submit architectural review request BEFORE starting work"

  financial_health:
    review_annually:
      - "HOA budget and financials"
      - "Reserve fund balance"
      - "Planned assessments"
      - "Pending litigation"
    warning_signs:
      - "Low reserve fund"
      - "Frequent special assessments"
      - "Deferred maintenance visible"
      - "High delinquency rate"
      - "Pending lawsuits"

  getting_involved:
    - "Attend annual meeting"
    - "Read board meeting minutes"
    - "Join a committee"
    - "Consider running for board"
    - "Vote on all ballots"

  communication_tips:
    - "Put all requests in writing"
    - "Use official channels (portal, email to management)"
    - "Keep copies of all correspondence"
    - "Follow up if no response within reasonable time"
    - "Escalate to board if management unresponsive"

  move_in_out_rules:
    - "Reserve elevator/loading area if required"
    - "Notify management of move date"
    - "Verify deposit requirements"
    - "Follow designated move hours"

