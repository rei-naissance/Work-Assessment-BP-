# =============================================================================
# HOME_TYPE.YAML — Housing Type-Specific Guides
# =============================================================================
# Maintenance and operational guidance specific to different housing situations
# Each module addresses unique challenges and responsibilities
# =============================================================================

single_family_exterior:
  title: "Single Family Home Exterior Maintenance"
  home_type: single_family
  section: 5
  category: home_type
  overview: "As a single-family homeowner, you're responsible for all exterior maintenance. Regular inspection and upkeep protect your investment and prevent costly repairs."

  seasonal_exterior_schedule:
    spring:
      - "Walk full perimeter — check foundation, siding, trim"
      - "Inspect roof from ground (binoculars) for winter damage"
      - "Clean gutters and downspouts"
      - "Check window and door caulking"
      - "Power wash siding, deck, driveway"
      - "Service lawn equipment"
      - "Check drainage — ensure water flows away from foundation"
    summer:
      - "Mid-season gutter check (especially if trees nearby)"
      - "Inspect and treat wood deck/fence"
      - "Check for wasp nests and pest activity"
      - "Maintain landscaping — keep vegetation away from foundation"
    fall:
      - "Clean gutters after leaves fall"
      - "Inspect roof for storm damage"
      - "Seal driveway cracks before winter"
      - "Winterize irrigation system"
      - "Store outdoor furniture or cover"
      - "Disconnect and store hoses"
    winter:
      - "Keep gutters clear of ice buildup"
      - "Monitor for ice dams"
      - "Clear snow from foundation and window wells"
      - "Check for animal entry points"

  siding_maintenance:
    inspection:
      frequency: "Annually (spring)"
      check_for:
        - "Cracks, holes, or damage"
        - "Loose or missing pieces"
        - "Signs of moisture (bubbling, warping)"
        - "Pest damage (holes, nesting)"
        - "Mold or mildew growth"
        - "Fading or peeling paint"
    by_type:
      vinyl:
        - "Clean with garden hose and soft brush"
        - "Repair cracks before they spread"
        - "Replace damaged sections (snap-lock system)"
        - "Lifespan: 20-40 years"
      wood:
        - "Repaint or restain every 3-5 years"
        - "Check for rot, especially at ground level"
        - "Caulk gaps and joints"
        - "Lifespan: 20-40 years with maintenance"
      fiber_cement:
        - "Repaint every 5-15 years"
        - "Caulk joints as needed"
        - "Very durable, low maintenance"
        - "Lifespan: 30-50 years"
      brick:
        - "Inspect mortar joints for deterioration"
        - "Repoint (tuckpoint) crumbling mortar"
        - "Check for efflorescence (white deposits)"
        - "Lifespan: 100+ years with maintenance"

  driveway_and_walkways:
    concrete:
      - "Seal every 2-3 years"
      - "Fill cracks before winter (prevents water expansion damage)"
      - "Remove stains promptly (oil, rust)"
      - "Avoid de-icing salts on concrete less than 1 year old"
    asphalt:
      - "Seal coat every 2-4 years"
      - "Fill cracks when they appear"
      - "Edge to prevent grass encroachment"
    pavers:
      - "Replace damaged pavers promptly"
      - "Refill joint sand after heavy rain"
      - "Prevent weed growth with polymeric sand"

  fencing_and_gates:
    wood_fence:
      - "Stain or seal every 2-3 years"
      - "Check for rot at ground level"
      - "Repair loose boards promptly"
      - "Check gate hardware and adjust"
    vinyl_fence:
      - "Clean with soap and water"
      - "Check posts for stability"
      - "Very low maintenance"
    chain_link:
      - "Check for rust, treat or replace"
      - "Tighten tension as needed"
      - "Lubricate gate hinges"

  foundation_monitoring:
    - "Keep soil graded away from foundation (6\" drop over 10')"
    - "Extend downspouts 4-6 feet from foundation"
    - "Don't plant shrubs tight against foundation"
    - "Monitor for cracks — document and track any changes"
    - "Keep mulch at least 6\" from foundation"

  exterior_paint:
    frequency: "Every 5-10 years (varies by material and climate)"
    signs_needed:
      - "Peeling or flaking"
      - "Fading"
      - "Chalking (powdery residue)"
      - "Cracking"
    prep_matters: "Surface preparation is 80% of a good paint job"

  contacts:
    handyman: "[HANDYMAN_NAME] — [HANDYMAN_PHONE]"
    painter: "[PAINTER_NAME] — [PAINTER_PHONE]"
    landscaper: "[LANDSCAPER_NAME] — [LANDSCAPER_PHONE]"

