mobile_home:
  title: "Mobile & Manufactured Home Care"
  home_type: mobile
  section: 5
  category: home_type
  overview: "Manufactured homes have unique maintenance needs. Proper leveling, anchoring, and underbelly care are essential for structural integrity and comfort."

  your_home_info:
    location: "[MOBILE_HOME_PARK_NAME]"
    lot_number: "[LOT_NUMBER]"
    park_management: "[PARK_MANAGEMENT_CONTACT]"
    home_size: "[MOBILE_HOME_SIZE]"  # single-wide, double-wide
    year_built: "[MOBILE_HOME_YEAR]"

  anchoring_and_tie_downs:
    critical_safety:
      - "Anchors secure home to ground — critical for wind resistance"
      - "Required by code in most areas"
      - "Inspect annually, especially before storm season"
    inspection_checklist:
      - "All straps present and properly tensioned"
      - "No rust, fraying, or damage to straps"
      - "Ground anchors secure (not pulling out)"
      - "Frame ties in good condition"
    after_storms: "Reinspect all tie-downs after high wind events"
    professional_check: "Every 3-5 years, or after any foundation movement"

  leveling:
    why_important:
      - "Prevents stress on frame and walls"
      - "Ensures doors and windows operate properly"
      - "Prevents plumbing issues"
      - "Improves HVAC efficiency"
    signs_need_releveling:
      - "Doors or windows stick or won't close"
      - "Cracks in walls or ceiling"
      - "Bouncy or uneven floors"
      - "Visible gaps at floor/wall junction"
      - "Plumbing problems"
    frequency: "Check every 2-3 years, or when signs appear"
    professional_required: "Leveling should be done by qualified installer"

  skirting_and_underbelly:
    skirting_purpose:
      - "Protects plumbing and underbelly from weather"
      - "Prevents pest entry"
      - "Improves appearance"
      - "Provides some insulation"
    skirting_maintenance:
      - "Inspect monthly for damage, gaps, or holes"
      - "Ensure ventilation openings are maintained"
      - "Keep vegetation away from skirting"
      - "Repair damage promptly to prevent pest entry"
    underbelly_inspection:
      annual_checks:
        - "Look for hanging or torn belly board"
        - "Check for moisture or water damage"
        - "Inspect insulation condition"
        - "Look for pest nesting or damage"
        - "Verify plumbing insulation intact"

  roof_maintenance:
    flat_roof_common:
      - "Apply roof coating every 3-5 years"
      - "Use coating designed for mobile home roofs"
      - "Apply before rainy season"
      - "Address any bubbles or separations"
    inspection:
      - "Check for soft spots (may indicate leak damage)"
      - "Inspect seams and edges"
      - "Check around vents and skylights"
      - "Look for ponding water areas"
    metal_roof:
      - "Check for rust and treat promptly"
      - "Ensure fasteners are tight"
      - "Inspect seams for gaps"

  plumbing_freeze_protection:
    vulnerable_areas:
      - "Pipes in underbelly"
      - "Water heater compartment"
      - "Kitchen and bath connections"
    protection:
      - "Insulate all exposed pipes"
      - "Use heat tape on vulnerable sections"
      - "Ensure skirting is intact (traps some heat)"
      - "In extreme cold, let faucets drip"
      - "Know main shutoff: [MOBILE_HOME_WATER_SHUTOFF]"

  hvac_considerations:
    typical_systems:
      - "Package unit (all-in-one outside unit)"
      - "Split system"
      - "Furnace with window AC"
    maintenance:
      - "Change filters monthly"
      - "Schedule professional service annually"
      - "Clean outdoor unit coils"
      - "Ensure ductwork connections are sealed"
    energy_efficiency:
      - "Mobile homes often have less insulation"
      - "Add underbelly insulation"
      - "Consider storm windows"
      - "Use weatherstripping on doors"

  storm_preparation:
    before_storm_season:
      - "Inspect and tighten all tie-downs"
      - "Secure loose skirting"
      - "Remove or secure outdoor items"
      - "Know evacuation route"
    during_high_winds:
      - "Mobile homes are vulnerable to tornadoes"
      - "Have evacuation plan to sturdy structure"
      - "Monitor weather alerts"
      - "Leave if tornado warning issued"

  park_living:
    know_your_lease:
      - "Lot rent amount and due date"
      - "What's included (water, sewer, trash)"
      - "Maintenance responsibilities"
      - "Rules and regulations"
      - "Notice requirements for rent increases"
    your_responsibilities:
      - "Home maintenance"
      - "Yard/lot maintenance (usually)"
      - "Utilities"
      - "Skirting and appearance"
    park_responsibilities:
      - "Common areas"
      - "Streets and roads"
      - "Water/sewer mains"

  insurance:
    mobile_home_policy:
      - "Different from standard homeowner's"
      - "Cover structure, contents, liability"
      - "Consider flood insurance separately"
