      condo_style: "You own interior, HOA owns exterior — check documents"
    your_townhouse: "[TOWNHOUSE_OWNERSHIP_TYPE]"

  your_hoa:
    name: "[TOWNHOUSE_HOA_NAME]"
    contact: "[TOWNHOUSE_HOA_CONTACT]"
    dues: "[TOWNHOUSE_DUES]"

  shared_walls:
    understand:
      - "Party wall is jointly owned (typically)"
      - "Each owner responsible for their side"
      - "Major modifications may require neighbor consent"
      - "Sound transmission is common concern"
    sound_mitigation:
      - "Add mass to walls (extra drywall layer)"
      - "Use acoustic insulation"
      - "Install soundproof curtains"
      - "Use rugs on hard floors"
      - "Place furniture against shared walls"
    water_issues:
