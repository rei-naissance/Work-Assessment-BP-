landscaping_spring:
  title: "Spring Landscaping Checklist"
  trigger: true  # Universal for all homes with yards
  section: 5
  category: landscaping
  overview: "Spring sets the stage for your landscape's entire year. A few hours of work in March-April prevents months of problems. This checklist covers the 2-4 week window when timing matters most."

  timing_guide:
    when_to_start: "When soil is workable but before plants break dormancy"
    temperature_triggers:
      soil_55f: "Apply pre-emergent weed control"
      last_frost: "Plant frost-sensitive annuals"
      soil_60f: "Safe to plant warm-season vegetables"
    your_area:
      last_frost_date: "[LAST_FROST_DATE]"
      usda_zone: "[USDA_ZONE]"

  week_by_week_schedule:
    early_spring_4_6_weeks_before_last_frost:
      lawn:
        - "□ Rake debris, leaves, and thatch"
        - "□ Remove winter covers from roses/shrubs"
        - "□ Test soil (if not done in 2 years)"
        - "□ Apply pre-emergent when soil reaches 55°F"
        - "□ Service mower: oil, blade, spark plug"
      beds:
        - "□ Clean out winter debris"
        - "□ Cut back ornamental grasses to 4-6 inches"
        - "□ Prune summer-flowering shrubs (butterfly bush, hydrangea)"
        - "□ Divide overgrown perennials"
      trees:
        - "□ Complete dormant pruning before buds break"
        - "□ Apply dormant oil spray for overwintering insects"
        - "□ Mulch newly planted trees"

    mid_spring_2_4_weeks_before_last_frost:
      lawn:
        - "□ Begin regular mowing when grass actively growing"
        - "□ First fertilizer application (warm-season grass)"
        - "□ Repair bare spots: rake, seed, cover with straw"
        - "□ Edge beds, walks, and driveways"
      beds:
        - "□ Add compost to beds before planting"
        - "□ Plant bare-root roses and shrubs"
        - "□ Transplant seedlings started indoors"
        - "□ Install fresh edging if damaged"
      irrigation:
        - "□ Turn on sprinkler system"
        - "□ Run each zone, check for broken heads, adjust coverage"
        - "□ Replace damaged sprinkler heads"
        - "□ Check hose bibs for winter damage"

    late_spring_after_last_frost:
      lawn:
        - "□ Apply post-emergent for existing weeds"
        - "□ Adjust mower height for growing season"
        - "□ Resume regular watering schedule"
      beds:
        - "□ Plant annuals and frost-sensitive perennials"
        - "□ Install summer containers"
        - "□ Apply fresh mulch (2-3 inches)"
        - "□ Install stakes for tall perennials"
      maintenance:
        - "□ Inspect for spring pest emergence"
        - "□ Set up hummingbird/butterfly feeders"
        - "□ Clean and repair outdoor furniture"

  pre_emergent_timing:
    critical_note: "Pre-emergent must be applied BEFORE weed seeds germinate — once you see weeds, it's too late"
    soil_temperature: "Apply when soil temperature reaches 55°F for 3-5 consecutive days"
    measurement: "Use soil thermometer at 2-inch depth, or track via local extension service"
    timing_by_region:
      southeast: "Late February to mid-March"
      northeast: "Late March to mid-April"
      midwest: "Early to mid-April"
      southwest: "Early February"
      west: "Varies by elevation — March to April"
    after_application: "Water in lightly within 24 hours"

  perennial_division:
    why: "Rejuvenates plants, prevents overcrowding, free plants for other areas"
    when_to_divide:
      spring_bloomers: "Divide in fall"
      summer_fall_bloomers: "Divide in early spring before growth begins"
    how_to_divide:
      - "Dig entire clump, keeping root ball intact"
      - "Shake or wash off soil to see root structure"
      - "Use sharp spade or knife to separate into sections"
      - "Each section should have 3-5 shoots and healthy roots"
      - "Replant immediately at same depth"
      - "Water thoroughly"

  soil_testing:
    why_now: "Spring results guide the season's amendments"
    how:
      - "Take samples from 5-10 spots across lawn/beds"
      - "Dig 4-6 inches deep, avoid recent fertilizer areas"
      - "Mix samples together in clean bucket"
      - "Send 1-2 cups to local extension office or lab"
    what_you_learn: "pH, nitrogen, phosphorus, potassium, organic matter"
    cost: "Typically $15-30 through extension service"
    local_extension: "[COUNTY_EXTENSION_OFFICE]"

  spring_equipment_prep:
    mower:
      - "□ Drain old fuel or add stabilizer"
      - "□ Change oil (4-stroke engines)"
      - "□ Replace or clean spark plug"
      - "□ Sharpen or replace blade"
      - "□ Clean air filter"
      - "□ Check tire pressure"
      - "□ Test run before first mow"
    trimmer:
      - "□ Replace fuel filter if 2-stroke"
      - "□ Install fresh line"
      - "□ Clean spark arrestor"
    irrigation:
      - "□ Inspect all heads and valves"
      - "□ Run manual cycle, check for leaks"
      - "□ Adjust heads for coverage"
      - "□ Program controller for spring schedule"

  tools_needed:
    - "Rake (leaf and garden)"
    - "Pruning shears and loppers"
    - "Garden fork or spade"
    - "Wheelbarrow"
    - "Soil thermometer"
    - "Broadcast spreader"
    - "Sprinkler system tools (head wrench, etc.)"

  regional_considerations:
    southeast:
      early_action: "Apply pre-emergent by early March — warm soil gets weeds started early"
      pest_watch: "Fire ants become active — treat mounds as they appear"
      timing: "Can plant warm-season annuals by April in most areas"
    northeast:
      patience: "Don't rush — late frosts common into May"
      frost_protection: "Keep row covers ready for cold snaps"
      timing: "Pre-emergent typically mid-April"
    midwest:
      frost_dates: "Highly variable — follow local extension guidance"
      flooding: "Check drainage after spring rains"
      timing: "Pre-emergent late April in northern areas"
    southwest:
      early_start: "Season starts in February for many areas"
      water: "Begin irrigation monitoring early"
      heat: "Get planting done before summer heat arrives"
    west:
      elevation_varies: "Timing varies dramatically by elevation"
      fire_prep: "Begin defensible space cleanup"
      water: "Check irrigation before mandatory rationing begins"

