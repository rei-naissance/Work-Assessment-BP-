landscaping_drainage:
  title: "Drainage & Grading Guide"
  trigger: true  # Critical for all homes
  section: 5
  category: landscaping
  overview: "Water is the number one cause of foundation damage, basement flooding, and landscape erosion. Proper grading and drainage costs little but prevents thousands in water damage. Most problems are DIY-fixable with basic landscaping."

  foundation_grading:
    golden_rule: "Ground should slope AWAY from foundation at minimum 6 inches drop per 10 feet"
    why: "Water pooling against foundation causes cracks, leaks, mold, and structural damage"
    how_to_check:
      - "Place 10-foot board against foundation"
      - "Put level on board"
      - "Measure gap at far end — should be at least 6 inches"
      - "Repeat at multiple points around house"
    problem_signs:
      - "Water pooling near foundation after rain"
      - "Soil settled against foundation"
      - "Basement dampness or leaks"
      - "Cracks in foundation walls"
      - "Efflorescence (white mineral deposits) on basement walls"

  grading_repair:
    tools_needed:
      - "Shovel and garden rake"
      - "Wheelbarrow"
      - "Level and 10-foot board"
      - "Fill soil (clay-based, not topsoil)"
      - "Tamper"
    steps:
      - "Remove any plants, mulch, or obstructions from work area"
      - "Add fill soil against foundation (clay-based compacts better)"
      - "Build up to create slope away from house"
      - "Compact soil firmly with tamper"
      - "Cover with 2 inches of mulch (keep 6 inches from siding)"
      - "Slope mulch to match soil grade"
    material:
      use: "Clay-based fill soil — compacts and sheds water"
      avoid: "Topsoil (too porous) or sand (drains toward foundation)"
    maintenance: "Check and re-grade annually — settling is normal"

  downspout_management:
    rule: "Water should discharge at least 4 feet from foundation — farther is better"
    problems_to_fix:
      - "Downspouts dumping directly at foundation"
      - "Extensions disconnected or damaged"
      - "Water pooling at discharge point"
      - "Downspouts draining toward house"
    solutions:
      extensions:
        - "Rigid plastic extensions (4+ feet)"
        - "Flexible roll-out extensions (extend when water flows)"
        - "Underground drain pipes to yard or street"
      splash_blocks: "Angled concrete or plastic blocks — better than nothing but extensions preferred"
      underground_drains:
        - "Rigid PVC pipe buried below grade"
        - "Slope minimum 1% away from house"
        - "Daylight at yard edge or connect to storm drain (if allowed)"
        - "Pop-up emitter at discharge point"
    your_downspouts:
      front_left: "[DOWNSPOUT_1_CONDITION]"
      front_right: "[DOWNSPOUT_2_CONDITION]"
      rear_left: "[DOWNSPOUT_3_CONDITION]"
      rear_right: "[DOWNSPOUT_4_CONDITION]"

  gutter_maintenance:
    frequency: "Clean twice yearly minimum — more if many trees"
    timing: "Late spring (after pollen/seeds) and late fall (after leaves)"
    cleaning_steps:
      - "Set up ladder safely — never overreach"
      - "Scoop debris by hand or with gutter scoop"
      - "Flush with hose to check flow and find leaks"
      - "Check downspout flow — snake if slow"
      - "Inspect for damage: holes, loose sections, improper slope"
    warning_signs:
      - "Water overflowing during rain"
      - "Sagging gutter sections"
      - "Water stains on siding below gutters"
      - "Mulch or soil erosion below gutter overflow"
    guards:
      pros: "Reduce cleaning frequency"
      cons: "Still need periodic maintenance, can clog with small debris"
      types: "Mesh screens, foam inserts, solid covers — quality varies significantly"

  common_drainage_problems:
    standing_water:
      causes: "Low spots, clay soil, high water table, insufficient slope"
      solutions:
        minor: "Fill low spots with soil, regrade"
        moderate: "Install French drain to redirect water"
        severe: "Sump pump, catch basin, or professional drainage system"
      timeline: "Standing water should drain within 24-48 hours after rain"

    yard_flooding:
      causes: "Neighbor's drainage, downspout discharge, impermeable surfaces, natural drainage pattern"
      solutions:
        - "Install swale (shallow ditch) to redirect flow"
        - "Add catch basin and underground pipe"
        - "Create rain garden in low area"
        - "Install French drain across flow path"

    basement_water:
      causes: "Poor grading, gutter issues, foundation cracks, high water table"
      first_steps:
        - "Fix grading — slopes away at 6 inches per 10 feet"
        - "Extend downspouts 4+ feet from house"
        - "Ensure gutters clean and functional"
        - "Seal visible foundation cracks"
      persistent: "May need interior French drain and sump pump — professional assessment recommended"

    driveway_puddles:
      causes: "Settlement, improper original grade, heaving"
      solutions:
        - "Minor: fill with cold patch asphalt"
        - "Moderate: Install channel drain across driveway"
        - "Severe: Replace or overlay driveway"

  french_drains:
    what: "Gravel-filled trench with perforated pipe that collects and redirects groundwater"
    when_needed:
      - "Persistent wet areas in yard"
      - "Water seeping into basement"
      - "Retaining wall weep drainage"
      - "Intercepting water before it reaches house"
    components:
      - "Trench: 6-12 inches wide, 18-24 inches deep"
      - "Landscape fabric: lines trench to prevent soil clogging gravel"
      - "Perforated pipe: 4-inch PVC or corrugated with holes facing down"
      - "Gravel: washed 3/4 inch stone"
    installation:
      - "Dig trench with 1% minimum slope toward discharge point"
      - "Line trench with landscape fabric, leaving excess on sides"
      - "Add 2-3 inches of gravel"
      - "Lay perforated pipe (holes DOWN)"
      - "Cover pipe with gravel to within 4 inches of surface"
      - "Fold fabric over gravel"
      - "Top with soil and sod, or decorative stone"
    discharge: "Must have somewhere for water to go — daylight at yard edge, dry well, or storm drain"
    diy_difficulty: "Moderate — labor intensive but straightforward technique"

  dry_wells:
    what: "Underground pit filled with gravel that allows water to slowly infiltrate soil"
    when_needed:
      - "No place for French drain to daylight"
      - "Downspout discharge point"
      - "Small-scale drainage collection"
    sizing: "General rule: 1 cubic foot of storage per 1 square foot of roof area draining to it"
    installation:
      - "Dig hole 3-4 feet diameter, 3-4 feet deep"
      - "Line with landscape fabric"
      - "Fill with large gravel or dry well chamber"
      - "Connect inlet pipe from water source"
      - "Cover with landscape fabric and backfill"
    limitations: "Won't work in clay soil or high water table — water has nowhere to go"

  rain_gardens:
    what: "Shallow planted depression that captures runoff and allows it to slowly infiltrate"
    benefits: "Attractive, filters pollutants, supports pollinators, reduces flooding"
    location: "10+ feet from foundation, in natural low point or downspout discharge area"
    sizing: "Typically 100-300 sq ft for residential — deeper is better than wider"
    plants: "Native plants tolerant of both wet and dry conditions"
    effectiveness: "Can reduce runoff from area by 30%+"

  swales:
    what: "Shallow vegetated channel that directs water flow"
    when_needed:
      - "Redirecting surface water around house"
      - "Managing neighbor's drainage"
      - "Replacing eroded drainage path"
    design:
      slope: "1-2% grade — enough to move water, slow enough to allow infiltration"
      shape: "Broad, shallow — not a ditch"
      width: "Depends on water volume — typically 2-4 feet"
    maintenance: "Mow, remove debris, check for erosion or sediment buildup"

  seasonal_maintenance:
    spring:
      - "□ Check grading — winter frost heave and settling common"
      - "□ Clean gutters of winter debris"
      - "□ Test sump pump operation"
      - "□ Clear debris from catch basins and drain inlets"
    summer:
      - "□ Monitor during heavy rain for problem areas"
      - "□ Clear drains before anticipated storms"
      - "□ Check for erosion in swales and drainage paths"
    fall:
      - "□ Clean gutters after leaf drop"
      - "□ Clear catch basins"
      - "□ Check downspout extensions secure"
    winter:
      - "□ Keep gutters clear of ice dams"
      - "□ Don't pile snow against foundation"
      - "□ Clear drain paths of snow for melt"

  professional_assessment:
    when_to_call:
      - "Persistent basement water despite correcting grading and gutters"
      - "Significant erosion or land movement"
      - "Neighbor's property draining onto yours (may require survey)"
      - "Complex drainage system design"
      - "Water table issues"
    who_to_call:
      grading_drainage: "Landscape contractor or drainage specialist"
      basement_water: "Basement waterproofing company"
      foundation_damage: "Structural engineer"
    drainage_contractor: "[DRAINAGE_CONTRACTOR] — [DRAINAGE_PHONE]"

  diy_vs_professional:
    diy_tasks:
      - "Gutter cleaning and maintenance"
      - "Adding downspout extensions"
      - "Minor grading adjustments"
      - "Simple French drain (if you can dig)"
      - "Dry well installation"
    hire_professional:
      - "Major grading around foundation"
      - "Complex drainage system design"
      - "Basement waterproofing systems"
      - "Retaining wall drainage"
      - "Connection to municipal storm drain"

  regional_considerations:
    southeast:
      challenges: "High rainfall, clay soils, hurricane deluges"
      tips: "Oversized gutters/downspouts, larger drainage capacity needed"
      note: "Humid conditions — poor drainage = mold risk"
    northeast:
      challenges: "Freeze/thaw cycles, ice dams, spring thaw flooding"
      tips: "Ensure drainage paths clear before snow melt"
      note: "Frost heave can alter grading — check annually"
    midwest:
      challenges: "Clay soils, rapid snow melt, severe storms"
      tips: "Sump pumps common necessity — battery backup essential"
      note: "Tornado-region storm intensity requires robust drainage"
    southwest:
      challenges: "Monsoon flash floods, hardpan soil, erosion"
      tips: "Dry wells effective in sandy soils; surface flow management critical"
      note: "Rare heavy rain makes drainage easy to neglect until problems occur"
    west:
      challenges: "Wildfire + rain = mudslides, varied soil conditions"
      tips: "Post-fire landscapes need immediate erosion control"
      note: "Some areas have water harvesting requirements — check local codes"

