landscaping_fall:
  title: "Fall Landscaping Checklist"
  trigger: true  # Universal for all homes with yards
  section: 5
  category: landscaping
  overview: "Fall is the most important season for lawn care. Cooler temperatures, warm soil, and reduced weed pressure create ideal conditions for overseeding and root development. What you do now determines next spring's success."

  timing_guide:
    when_to_start: "6-8 weeks before first expected frost"
    key_dates:
      first_frost_date: "[FIRST_FROST_DATE]"
      soil_temp_drops_below_55: "Last chance for pre-emergent"
      ground_freeze: "All irrigation winterized before this"

  fall_lawn_priorities:
    number_1_aeration:
      why: "Compacted soil prevents water, air, and nutrients from reaching roots"
      when: "Early fall for cool-season grass; late spring for warm-season"
      how:
        - "Water lawn day before (softens soil)"
        - "Mark irrigation heads, valve boxes, shallow utilities"
        - "Run core aerator in two perpendicular passes"
        - "Leave soil plugs on lawn — they break down naturally"
      frequency: "Annually for high-traffic areas; every 2-3 years otherwise"
      diy_or_rent: "Rent core aerator (~$60-80/day) or hire lawn service"

    number_2_overseeding:
      why: "Thick lawn crowds out weeds — overseed thin areas now"
      timing: "Early fall — 6-8 weeks before first frost (grass needs time to establish)"
      steps:
        - "Aerate first (seed falls into holes)"
        - "Rake to remove debris and loosen soil surface"
        - "Apply seed with broadcast spreader at recommended rate"
        - "Apply thin layer of compost or peat moss over seed"
        - "Keep consistently moist until germination (10-14 days)"
      seed_selection: "Match existing grass type — buy quality seed (low weed/other seed content)"
      cool_season_rates:
        overseeding: "3-4 lbs per 1,000 sq ft"
        bare_spots: "6-8 lbs per 1,000 sq ft"

    number_3_fall_fertilizing:
      why: "Fall fertilizer builds root reserves for spring green-up"
      timing:
        cool_season: "September through October — most important application of the year"
        warm_season: "Light application in early fall; stop 6 weeks before dormancy"
      type: "High nitrogen for cool-season; balanced or winterizer for warm-season"
      skip_if: "Soil test shows adequate levels"

  week_by_week_schedule:
    early_fall_6_8_weeks_before_frost:
      lawn:
        - "□ Aerate compacted areas"
        - "□ Overseed thin/bare areas (cool-season grass)"
        - "□ Apply fall fertilizer"
        - "□ Continue regular mowing — don't let grass get too tall"
      beds:
        - "□ Plant spring-blooming bulbs (tulips, daffodils, crocus)"
        - "□ Divide and transplant perennials"
        - "□ Cut back finished perennials"
        - "□ Take cuttings from tender plants to overwinter indoors"
      trees:
        - "□ Water deeply before ground freezes — trees need moisture"
        - "□ Plant new trees and shrubs (ideal time — roots establish before winter)"
        - "□ Note trees needing winter pruning"

    mid_fall_2_4_weeks_before_frost:
      lawn:
        - "□ Continue mowing — gradually lower height to final cut"
        - "□ Apply pre-emergent for winter annual weeds (optional)"
        - "□ Rake or mulch fallen leaves — don't let them smother lawn"
      beds:
        - "□ Pull spent annuals"
        - "□ Add compost to beds"
        - "□ Mulch perennials after ground begins to cool"
      equipment:
        - "□ Drain gas from equipment or add stabilizer"
        - "□ Clean mower thoroughly before storage"
        - "□ Sharpen and oil tools"

    late_fall_around_first_frost:
      lawn:
        - "□ Final mow at lower height (prevents matting under snow)"
        - "□ Remove last leaves — leaf mat can kill grass"
      irrigation:
        - "□ Winterize sprinkler system (blow out lines)"
        - "□ Shut off and drain outdoor faucets"
        - "□ Drain hoses and store indoors"
      protection:
        - "□ Wrap young tree trunks (prevents sunscald)"
        - "□ Apply deer repellent to vulnerable plants"
        - "□ Install burlap screens for evergreens in exposed locations"

  leaf_management:
    why_it_matters: "Leaf mat blocks light and traps moisture — can kill grass over winter"
    options:
      mulching: "Best option — mow over leaves to chop finely, adds nutrients to lawn"
      composting: "Rake to compost pile — excellent brown material"
      removal: "Bag and dispose if too heavy to mulch"
    frequency: "Don't let leaves accumulate more than 2 inches before mulching/removal"
    avoid: "Blowing all leaves into beds — some mulch is good, thick layers can smother plants"

  bulb_planting:
    timing: "Plant when soil temperature drops below 60°F — typically 6-8 weeks before ground freezes"
    depth_rule: "Plant 2-3 times the bulb's height deep"
    common_bulbs:
      tulips: "6-8 inches deep"
      daffodils: "6 inches deep"
      crocus: "3-4 inches deep"
      hyacinths: "6 inches deep"
    tip: "Plant in groups of 10+ for visual impact"
    fertilize: "Bone meal in planting hole provides phosphorus for root development"

  tree_and_shrub_care:
    watering:
      - "Continue watering until ground freezes"
      - "Evergreens especially need moisture going into winter"
      - "Trees lose moisture through bark in dry winter conditions"
    wrapping:
      young_trees: "Wrap thin-barked trees (maples, fruit trees) to prevent sunscald"
      material: "Paper tree wrap or white plastic guards"
      timing: "Apply after leaves drop, remove in spring"
    mulching:
      - "Add 2-4 inches of mulch after ground cools"
      - "Protects roots from freeze/thaw cycles"
      - "Keep mulch away from trunk"

  fall_equipment_maintenance:
    mower_storage:
      - "Run engine until fuel is exhausted, OR add fuel stabilizer and run 5 minutes"
      - "Clean underside thoroughly — dried grass is corrosive"
      - "Change oil if not done in spring"
      - "Disconnect battery or charge monthly"
      - "Store in dry location"
    trimmer:
      - "Empty fuel (2-stroke) or stabilize (4-stroke)"
      - "Clean air filter"
      - "Remove trimmer line to prevent coil deformation"
    tools:
      - "Clean all hand tools — remove soil and sap"
      - "Sharpen shovels, hoes, pruners"
      - "Apply light oil to metal parts"
      - "Store in dry location"

  irrigation_winterization:
    critical: "Water in pipes will freeze and burst — blow out before first hard freeze"
    steps:
      - "Shut off water supply to irrigation system"
      - "Set controller to 'off' or 'rain mode' (keeps programming)"
      - "Use air compressor (max 50 PSI) to blow water from lines"
      - "Open drain valves and leave open"
      - "Insulate backflow preventer if above ground"
    timing: "Before nighttime temperatures consistently below 32°F"
    diy_or_hire: "Hire irrigation company (~$50-100) unless you have proper compressor"
    irrigation_company: "[IRRIGATION_COMPANY] — [IRRIGATION_PHONE]"

  regional_considerations:
    southeast:
