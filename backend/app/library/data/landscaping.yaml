# =============================================================================
# LANDSCAPING.YAML — Lawn, Landscape, and Drainage Maintenance
# =============================================================================
# Comprehensive guides for lawn care, trees, shrubs, and water management
# Region-aware with seasonal scheduling by climate zone
# =============================================================================

landscaping_general:
  title: "Lawn & Landscaping Master Guide"
  trigger: has_yard
  section: 5
  category: landscaping
  overview: "A healthy lawn increases property value by 5-15% and provides natural cooling. Proper care means mowing, watering, and feeding at the right times — not harder work, smarter scheduling."

  your_lawn:
    grass_type: "[GRASS_TYPE]"  # bermuda, zoysia, fescue, st_augustine, kentucky_bluegrass
    lawn_size: "[LAWN_SQUARE_FEET]"
    soil_type: "[SOIL_TYPE]"  # clay, loam, sandy
    irrigation: "[IRRIGATION_TYPE]"  # sprinkler_system, hose, drip, none
    last_soil_test: "[SOIL_TEST_DATE]"

  mowing_fundamentals:
    golden_rule: "Never remove more than 1/3 of the grass blade — cutting too short stresses roots"
    height_by_grass_type:
      bermuda: "1-1.5 inches"
      zoysia: "1.5-2 inches"
      st_augustine: "3-4 inches"
      fescue: "3-4 inches"
      kentucky_bluegrass: "2.5-3.5 inches"
    frequency:
      growing_season: "Weekly or as needed to maintain 1/3 rule"
      dormant_season: "Every 2-3 weeks or as needed"
    technique:
      - "Alternate mowing patterns each time (prevents ruts and lean)"
      - "Mow when grass is dry (cleaner cut, less disease)"
      - "Leave clippings on lawn (returns nitrogen) unless heavy"
      - "Sharpen blades: dull cuts tear grass, inviting disease"
    blade_sharpening:
      frequency: "Every 20-25 hours of use or at least 2x per season"
      signs_dull: "Grass tips look brown/ragged after mowing"

  watering_guide:
    rule: "Deep and infrequent beats shallow and frequent"
    amount: "1 inch per week (including rainfall)"
    timing:
      best: "Early morning (4-10 AM) — minimal evaporation, grass dries before nightfall"
      avoid: "Evening watering promotes fungal disease"
    measurement:
      method: "Place empty tuna can in lawn, run sprinkler until 1 inch collected"
      sprinkler_systems: "Check each zone delivers even coverage monthly"
    drought_tips:
      - "Raise mowing height — taller grass shades roots"
      - "Allow lawn to go dormant rather than light watering"
      - "Focus water on high-visibility areas during restrictions"

  fertilizing_schedule:
    soil_test_first: "Always soil test before fertilizing — saves money and prevents over-application"
    soil_test_frequency: "Every 2-3 years"
    timing_by_grass:
      warm_season: # bermuda, zoysia, st_augustine
        primary: "Late spring through summer (April-August)"
        avoid: "Fall fertilizing pushes growth before dormancy"
      cool_season: # fescue, bluegrass
        primary: "Early fall (September) and late spring (April-May)"
        avoid: "Summer fertilizing stresses grass in heat"
    application:
      - "Apply when grass is dry but soil is moist"
      - "Use broadcast spreader for even coverage"
      - "Water lightly after application"
      - "Don't fertilize before heavy rain (runoff pollution)"

  annual_lawn_calendar:
    early_spring:
      - "Remove debris, dethatch if needed (thatch > 0.5 inch)"
      - "Apply pre-emergent weed control (before soil hits 55°F)"
      - "First mow when grass actively growing"
      - "Service mower: oil, spark plug, blade sharpening"
    late_spring:
      - "Begin regular mowing schedule"
      - "Spot-treat weeds as they appear"
      - "First fertilizer application for warm-season grass"
    summer:
      - "Maintain consistent watering schedule"
      - "Raise mowing height during heat stress"
      - "Monitor for pest and disease"
      - "Sharpen blades mid-season"
    early_fall:
      - "Overseed thin areas (best time for cool-season grass)"
      - "Aerate compacted areas"
      - "Apply fall fertilizer (cool-season grass)"
      - "Lower mowing height gradually before winter"
    late_fall:
      - "Final mow at lower height to prevent matting"
      - "Rake or mulch fallen leaves"
      - "Winterize irrigation system before first freeze"
      - "Clean and store mower properly"

  common_problems:
    brown_patches:
      possible_causes: "Drought, fungal disease, grub damage, dog urine"
      diagnose: "Pull on brown grass — if it lifts easily like carpet, likely grubs"
      fungal_indicators: "Rings or irregular patches, white/gray coating in morning"
    bare_spots:
      causes: "Heavy traffic, shade, pet damage, disease"
      fix: "Rake, loosen soil, seed, cover lightly with straw, keep moist"
    weeds:
      prevention: "Thick healthy lawn is best weed prevention"
      crabgrass: "Pre-emergent in early spring before germination"
      broadleaf: "Post-emergent herbicide or manual removal"
    compacted_soil:
      signs: "Water runs off rather than soaking in, thin grass"
      fix: "Core aeration in fall (warm-season) or spring (cool-season)"

  equipment_maintenance:
    mower:
      before_each_use: "Check oil level, inspect blade"
      monthly: "Clean underside, check tire pressure"
      annually: "Change oil, replace spark plug, sharpen/replace blade, clean air filter"
    string_trimmer:
      after_use: "Clean debris from guard and head"
      monthly: "Check line feed mechanism, inspect spark arrestor"
    blower:
      monthly: "Clean air filter, inspect fuel lines"

  diy_vs_professional:
    diy_tasks:
      - "Regular mowing, edging, trimming"
      - "Basic fertilizing and weed control"
      - "Overseeding small areas"
      - "Simple irrigation adjustments"
    hire_professional:
      - "Soil testing and amendment planning"
      - "Major aeration or dethatching"
      - "Persistent pest or disease issues"
      - "Large-scale overseeding or sod installation"
      - "Irrigation system installation or major repair"
    lawn_service: "[LAWN_SERVICE_NAME] — [LAWN_SERVICE_PHONE]"

  regional_notes:
    southeast: "Warm-season grasses (bermuda, zoysia, st_augustine) dominate. Watch for chinch bugs in st_augustine, fungal issues in high humidity."
    northeast: "Cool-season fescue and bluegrass. Shorter growing season. Fall is prime overseeding time."
    midwest: "Mix of cool and transition zone grasses. Late fall fertilizing critical for spring green-up."
    southwest: "Water conservation critical. Consider xeriscaping. Buffalo grass and bermuda handle heat."
    west: "Varies by elevation. Many areas have water restrictions — plan accordingly."

# -----------------------------------------------------------------------------

landscaping_trees_shrubs:
  title: "Tree & Shrub Care Guide"
  trigger: has_trees_or_shrubs
  section: 5
  category: landscaping
  overview: "Mature trees can add $1,000-10,000 to property value and reduce cooling costs by 25%. Proper care extends their life and prevents expensive removal."

  your_trees:
    tree_1:
      species: "[TREE_1_SPECIES]"
      location: "[TREE_1_LOCATION]"
      approximate_age: "[TREE_1_AGE]"
      last_inspection: "[TREE_1_INSPECTION_DATE]"
    tree_2:
      species: "[TREE_2_SPECIES]"
      location: "[TREE_2_LOCATION]"
      approximate_age: "[TREE_2_AGE]"
      last_inspection: "[TREE_2_INSPECTION_DATE]"

  tree_inspection_checklist:
    frequency: "Twice yearly (spring and fall) plus after major storms"
    trunk:
      - "Look for cracks, splits, or cavities"
      - "Check for fungal growth (mushrooms, conks) — signs of internal decay"
      - "Inspect for bark damage, peeling, or cankers"
      - "Note any lean changes from previous inspection"
    branches:
      - "Dead branches (no leaves, brittle, bark falling off)"
      - "Crossing or rubbing branches"
      - "Hanging or broken branches (widow-makers)"
      - "Branches within 10 feet of house or power lines"
    roots:
      - "Visible root rot or mushrooms at base"
      - "Heaving soil around root zone"
      - "Root damage from construction or digging"
    canopy:
      - "Overall shape and balance"
      - "Discolored or sparse foliage"
      - "Premature leaf drop"
      - "Signs of pest infestation"

  pruning_guide:
    when_to_prune:
      dead_damaged: "Anytime — remove promptly"
      most_trees: "Late winter/early spring while dormant"
      spring_flowering: "Immediately after blooming"
      avoid: "Late summer through fall (stimulates growth before dormancy)"
    what_to_prune:
      - "Dead, damaged, or diseased branches (3 D's)"
      - "Branches crossing or rubbing"
      - "Water sprouts (vertical shoots from branches)"
      - "Suckers (shoots from base or roots)"
      - "Branches creating clearance issues"
    how_to_prune:
      - "Cut just outside branch collar (the swelling where branch meets trunk)"
      - "Don't leave stubs — they invite decay"
      - "For branches over 2 inches, use 3-cut method to prevent bark tearing"
      - "Don't top trees — causes weak regrowth and decay"
    tools:
      hand_pruners: "Branches up to 3/4 inch"
      loppers: "Branches 3/4 to 2 inches"
      pruning_saw: "Branches over 2 inches"
      pole_pruner: "Branches you can't reach from ground"
    safety:
      - "Never prune near power lines — call utility company"
      - "Wear safety glasses and gloves"
      - "Don't climb trees with chainsaw — leave to professionals"
      - "Be aware of falling branches"

  mulching:
    benefits: "Retains moisture, moderates soil temperature, suppresses weeds, improves soil"
    proper_technique:
      depth: "2-4 inches"
      extent: "Out to drip line if possible, minimum 2-3 foot radius"
      critical: "Keep mulch 3-6 inches away from trunk (mulch volcano = tree death)"
    material: "Shredded hardwood, pine bark, or wood chips"
    refresh: "Add mulch annually to maintain depth"
    avoid:
      - "Piling mulch against trunk (causes rot)"
      - "Using plastic underneath (prevents air and water)"
      - "Fresh grass clippings (can mat and mold)"

  watering_trees:
    newly_planted:
      frequency: "Weekly deep watering for first 2 years"
      amount: "10-15 gallons per inch of trunk diameter"
      method: "Slow trickle at base, soaker hose, or tree watering bag"
    established_trees:
      when: "During extended drought (3+ weeks without rain)"
      how: "Deep soaking once per week rather than frequent light watering"
      note: "Water at drip line, not trunk — that's where absorbing roots are"

  shrub_maintenance:
    planting_distance: "Plant at least 3 feet from house foundation"
    pruning_schedule:
      spring_blooming: "Prune immediately after flowering"
      summer_blooming: "Prune in late winter/early spring"
      evergreen: "Light shaping in late spring"
    rejuvenation: "Old overgrown shrubs: cut 1/3 of oldest stems to ground each year for 3 years"
    pest_watch: "Inspect monthly for scale, aphids, spider mites — treat early"

  common_problems:
    dead_branches:
      cause: "Disease, drought stress, storm damage, age"
      action: "Remove promptly — dead wood attracts pests and can fall"
    leaning_tree:
      sudden_lean: "Emergency — call arborist immediately"
      gradual_lean: "May be normal growth toward light, but have assessed if near structures"
    bark_damage:
      from_mower: "Prevent with mulch ring; damage can kill tree"
      from_animals: "Wrap trunk with hardware cloth"
    fungal_growth:
      mushrooms_at_base: "Often indicates root rot — have arborist assess"
      conks_on_trunk: "Sign of internal decay — may need removal"

  storm_damage_response:
    immediate:
      - "Stay away from downed limbs near power lines — call utility"
      - "Document damage with photos before cleanup"
      - "Don't attempt removal of large hung-up branches"
    after_storm:
      - "Remove completely broken branches cleanly"
      - "Don't top damaged trees — make proper cuts or have arborist assess"
      - "Trees that can be saved are worth saving"
    when_to_remove:
      - "More than 50% of crown damaged"
      - "Major structural damage to trunk"
      - "Tree poses imminent hazard"

  diy_vs_professional:
    diy_safe:
      - "Pruning branches you can reach from ground (under 10 feet)"
      - "Branches under 3 inches diameter"
      - "Mulching and watering"
      - "Basic inspection"
    hire_certified_arborist:
      - "Any work requiring ladder or climbing"
      - "Branches near power lines (call utility for those over lines)"
      - "Large branch removal or tree removal"
      - "Disease or pest diagnosis"
      - "Cabling or bracing"
      - "Trees showing signs of decline"
    arborist: "[ARBORIST_NAME] — [ARBORIST_PHONE]"
    verify_credentials: "Look for ISA Certified Arborist credential"

  regional_notes:
    southeast: "Watch for pine beetles, oak wilt. Hurricane prep: thin crowns, remove weak branches."
    northeast: "Ice storm damage common. Avoid salt damage near roads."
    midwest: "Emerald ash borer has decimated ash trees. Storm damage from tornadoes."
    southwest: "Water stress is major killer. Protect from desert sun damage."
    west: "Fire mitigation: limb up trees, remove dead material, create defensible space."

