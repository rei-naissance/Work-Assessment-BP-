solar_panels:
  title: "Solar Panel System Care"
  feature: has_solar
  section: 5
  category: systems
  overview: "Solar systems require minimal maintenance but regular monitoring ensures optimal performance. Catching problems early protects your investment and energy savings."

  your_system_info:
    system_size: "[SOLAR_SYSTEM_SIZE] kW"
    panel_count: "[SOLAR_PANEL_COUNT] panels"
    panel_location: "[SOLAR_PANEL_LOCATION]"  # roof, ground mount
    inverter_location: "[INVERTER_LOCATION]"
    inverter_type: "[INVERTER_TYPE]"  # string, micro, hybrid
    monitoring_system: "[SOLAR_MONITORING_SYSTEM]"
    installer: "[SOLAR_INSTALLER] — [SOLAR_INSTALLER_PHONE]"
    install_date: "[SOLAR_INSTALL_DATE]"

  monitoring_routine:
    daily_automatic:
      - "Check monitoring app for daily production"
      - "Compare to expected output for weather conditions"
      - "Note any alerts or error messages"
    monthly_review:
      - "Compare month-over-month production"
      - "Check for consistent underperformance"
      - "Review utility bill for expected savings"
    what_to_watch:
      - "Sudden drop in production (more than 20%)"
      - "One or more panels producing zero"
      - "Inverter error codes or offline status"
      - "Gradual decline over time (may indicate soiling or degradation)"

  cleaning_guidelines:
    frequency: "1-2 times per year (or more in dusty/pollen-heavy areas)"
    best_time: "Early morning when panels are cool, or on overcast day"
    method:
      - "1. Rinse with garden hose (no pressure washer)"
      - "2. If needed, use soft brush with telescoping handle"
      - "3. Use plain water or mild soap solution"
      - "4. Rinse thoroughly"
    do_not:
      - "Use pressure washer (damages panels and seals)"
      - "Use abrasive cleaners or brushes"
      - "Walk on panels"
      - "Clean in direct sun (thermal shock risk)"
      - "Use hard water if possible (mineral deposits)"
    safety: "If panels are not reachable from ground, hire professional"

  visual_inspection:
    quarterly:
      - item: "Panel surfaces"
        look_for: "Cracks, chips, discoloration, hot spots"
      - item: "Wiring and connections"
        look_for: "Exposed wires, animal damage, loose connections"
      - item: "Mounting hardware"
        look_for: "Rust, loose bolts, lifted flashing"
      - item: "Shading"
        look_for: "New tree growth blocking panels"
      - item: "Debris"
        look_for: "Leaves, branches, bird nests"

  inverter_maintenance:
    check_regularly:
      - "Green status light (indicates normal operation)"
      - "Error codes on display"
      - "Fan running (for string inverters)"
      - "No unusual noises or burning smell"
    location_care:
      - "Keep area around inverter clear (12 inches minimum)"
      - "Ensure ventilation is not blocked"
      - "Protect from direct water spray"
    lifespan: "String inverters: 10-15 years, Microinverters: 20-25 years"

  tree_management:
    - "Survey shading morning, midday, and afternoon"
    - "Even partial shading significantly reduces output"
    - "Trim trees before they shade panels"
    - "Consider seasonal sun angle — winter sun is lower"
    - "Maintain clear southern exposure (in Northern Hemisphere)"

  warranty_tracking:
    typical_warranties:
      - "Panels: 25-year performance warranty (guaranteed output)"
      - "Inverter: 10-25 year warranty depending on type"
      - "Installation/workmanship: 1-10 years depending on installer"
    keep_records:
      - "Installation contract and permits"
      - "Warranty certificates"
      - "Monitoring account credentials"
      - "Production data history"
    claim_process: "Contact installer first, then manufacturer if needed"

  grid_connection:
    know_your_setup:
      - "Net metering agreement terms"
      - "Utility interconnection requirements"
      - "Annual true-up or settlement date"
    utility_contact: "[UTILITY_COMPANY] — [UTILITY_SOLAR_DEPARTMENT]"

  diy_vs_pro:
    diy_tasks:
      - "Monitoring production data"
      - "Ground-level panel cleaning"
      - "Visual inspections (from ground)"
      - "Trimming nearby vegetation"
      - "Resetting inverter (per manufacturer instructions)"
    call_pro:
      - "Roof-level cleaning or inspection"
      - "Electrical troubleshooting"
      - "Inverter replacement"
      - "Panel replacement"
      - "Mounting hardware repairs"
      - "Any work requiring DC disconnect"

  safety_warnings:
    - icon: "⚠️"
      warning: "Solar panels produce DC electricity when exposed to light"
      implication: "System is always energized during daylight — cannot be fully shut off"
    - icon: "⚠️"
      warning: "Do not attempt electrical repairs yourself"
    - icon: "⚠️"
      warning: "In fire emergency, inform firefighters of solar panels"

  regional_note: "Southeast: Pollen season (March-May) may require additional cleaning. Hurricane preparation: systems are designed to withstand high winds, but document condition before and after storms. Summer storms may temporarily reduce production — not a system problem."

  contacts:
    solar_installer: "[SOLAR_INSTALLER] — [SOLAR_INSTALLER_PHONE]"
    inverter_support: "[INVERTER_MANUFACTURER] — [INVERTER_SUPPORT_PHONE]"

