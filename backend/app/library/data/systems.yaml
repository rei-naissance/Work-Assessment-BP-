well_water:
  title: "Well Water System Maintenance"
  feature: has_well_water
  section: 5
  category: systems
  overview: "Private wells require owner maintenance and testing — no utility company monitors your water quality. Annual testing and proper wellhead protection keep your water safe."

  your_well_info:
    well_location: "[WELL_LOCATION]"
    well_depth: "[WELL_DEPTH] feet"
    pump_type: "[WELL_PUMP_TYPE]"  # submersible, jet, hand
    pressure_tank_location: "[PRESSURE_TANK_LOCATION]"
    treatment_system: "[WATER_TREATMENT_DESCRIPTION]"
    last_water_test: "[LAST_WELL_TEST_DATE]"

  annual_testing:
    required_tests:
      - test: "Total Coliform Bacteria"
        why: "Indicates possible contamination from surface water or sewage"
        action_if_positive: "Shock chlorinate well, retest, investigate source"
      - test: "Nitrates"
        why: "From fertilizers or septic — dangerous for infants"
        safe_level: "Below 10 mg/L"
      - test: "pH Level"
        why: "Affects corrosion of pipes and effectiveness of treatment"
        ideal_range: "6.5 - 8.5"
    recommended_tests:
      - "Hardness (affects appliances and soap efficiency)"
      - "Iron and manganese (staining, taste)"
      - "Lead (especially in older homes with lead pipes)"
    test_more_often_if:
      - "Pregnant woman or infant in household"
      - "Recurring GI illness in household"
      - "Change in taste, odor, or appearance"
      - "Nearby land use changes (construction, agriculture)"
      - "After flooding or heavy rains"
    where_to_test: "[LOCAL_WATER_TESTING_LAB]"

  monthly_checks:
    - task: "Check pressure gauge"
      normal: "40-60 psi typical, should match pressure switch settings"
      location: "[PRESSURE_GAUGE_LOCATION]"
    - task: "Listen for pump short-cycling"
      concern: "Pump turning on/off frequently indicates waterlogged tank or leak"
    - task: "Visual well cap inspection"
      check: "Cap secure, no cracks, vent screen intact"
    - task: "Monitor water usage"
      concern: "Unexplained increase may indicate leak"

  quarterly_tasks:
    - task: "Inspect pressure tank"
      check: "No rust, condensation, or leaks"
    - task: "Check pressure switch contacts"
      look_for: "Burning or pitting on contacts"
    - task: "Maintain treatment systems"
      includes: "Change filters, check salt levels in softener, UV bulb status"

  wellhead_protection:
    distance_requirements:
      - "Septic tank: minimum 50 feet"
      - "Septic drain field: minimum 100 feet"
      - "Petroleum tanks: minimum 50 feet"
      - "Livestock areas: minimum 50 feet"
      - "Pesticide/fertilizer storage: minimum 100 feet"
    physical_protection:
      - "Sanitary well cap with vermin-proof screen"
      - "Casing extends 6-12 inches above ground"
      - "Ground slopes away from well"
      - "No puddles or standing water near well"
      - "Concrete pad around well if subject to traffic"

  pressure_tank_maintenance:
    purpose: "Maintains pressure and prevents pump short-cycling"
    check_air_pressure:
      how: "Turn off pump, drain tank, check with tire gauge on air valve"
      setting: "2 psi below pump cut-in pressure (typically 28-38 psi)"
    waterlogged_signs:
      - "Pump cycles frequently (more than 6x per hour with normal use)"
      - "Pressure fluctuates rapidly"
      - "Tank feels heavy/full when pump is off"
    replacement: "Bladder tanks typically last 10-15 years"

  warning_signs:
    water_quality:
      - "Change in taste, color, or odor"
      - "Staining on fixtures (red = iron, black = manganese)"
      - "Slippery or soapy feeling (high sodium)"
      - "Rotten egg smell (hydrogen sulfide or bacteria)"
    system_problems:
      - "No water or very low pressure"
      - "Pump runs continuously"
      - "Pump short-cycles (on/off rapidly)"
      - "Sputtering or air in water lines"
      - "Circuit breaker tripping"

  diy_vs_pro:
    diy_tasks:
      - "Visual inspections"
      - "Checking pressure gauge"
      - "Adjusting pressure tank air charge"
      - "Replacing treatment system filters"
      - "Shock chlorination (with proper research)"
    call_pro:
      - "Pump replacement or repair"
      - "Pressure switch problems"
      - "Well contamination issues"
      - "Casing or seal repairs"
      - "Water quality problems requiring investigation"
      - "Electrical troubleshooting"

  emergency_no_water:
    steps:
      - "1. Check circuit breaker for well pump"
      - "2. Check pressure switch — may need manual reset"
      - "3. Check pressure gauge — zero may indicate pump failure"
      - "4. Listen at well cap — no sound may mean pump failure"
      - "5. If pump running but no water — may be well recovery issue or pump problem"
      - "6. Call well service: [WELL_SERVICE] — [WELL_SERVICE_PHONE]"

  regional_note: "Southeast Piedmont: Wells in fractite rock may have lower yields. Iron and manganese common — consider treatment if staining occurs. Test after hurricanes/flooding — contamination risk increases. Some areas have naturally occurring radon in groundwater."

  contacts:
    well_service: "[WELL_SERVICE] — [WELL_SERVICE_PHONE]"
    water_testing_lab: "[WATER_TESTING_LAB] — [TESTING_LAB_PHONE]"
    health_department: "[COUNTY_HEALTH_DEPT] — [HEALTH_DEPT_PHONE]"

