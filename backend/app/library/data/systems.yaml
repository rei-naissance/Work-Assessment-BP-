sump_pump:
  title: "Sump Pump Maintenance"
  feature: has_sump_pump
  section: 5
  category: systems
  overview: "Sump pumps fail when you need them most — during storms and power outages. Regular testing and backup power are essential for basement flood prevention."

  your_sump_pump:
    location: "[SUMP_PUMP_LOCATION]"
    type: "[SUMP_PUMP_TYPE]"  # pedestal, submersible
    backup_type: "[SUMP_BACKUP_TYPE]"  # battery, water-powered, secondary pump
    discharge_location: "[SUMP_DISCHARGE_LOCATION]"
    alarm: "[SUMP_ALARM_INFO]"

  quarterly_testing:
    pump_test:
      - "1. Locate sump pit: [SUMP_PUMP_LOCATION]"
      - "2. Remove pit cover"
      - "3. Slowly pour 5 gallons of water into pit"
      - "4. Pump should activate and empty pit"
      - "5. Listen for smooth operation — no grinding"
      - "6. Replace cover"
    backup_system_test:
      - "Disconnect primary power"
      - "Pour water into pit"
      - "Verify backup activates"
      - "Reconnect primary power"
    alarm_test:
      - "Pour water until alarm activates"
      - "Replace batteries if alarm weak"

  annual_maintenance:
    - task: "Clean pump and pit"
      how: "Remove pump, clean debris from pit, rinse pump"
      check: "Inlet screen clear of debris"
    - task: "Inspect discharge line"
      check: "No clogs, ice damage, or disconnections"
    - task: "Check check valve"
      what: "Prevents water from flowing back into pit"
      test: "Water should not drain back after pump shuts off"
    - task: "Inspect float switch"
      verify: "Moves freely, not tangled on cords"
    - task: "Replace backup battery"
      frequency: "Every 2-3 years (or per manufacturer)"
      type: "[SUMP_BATTERY_TYPE]"

  backup_power_options:
    battery_backup:
      pros: "Works during power outages, affordable"
      cons: "Limited runtime (typically 5-8 hours), batteries need replacement"
      maintenance: "Replace battery every 2-3 years, test quarterly"
    water_powered_backup:
      pros: "Unlimited runtime (uses municipal water pressure)"
      cons: "Uses significant water, requires good pressure, doesn't work on well"
    generator:
      pros: "Powers primary pump at full capacity"
      cons: "Requires fuel, may not auto-start"
    secondary_pump:
      pros: "Redundancy if primary fails"
      cons: "Also needs power, two pumps to maintain"

  discharge_line_care:
    - "Ensure line drains away from foundation (10+ feet ideal)"
    - "Check for clogs before and during rainy season"
    - "Insulate or bury below frost line to prevent freezing"
    - "Ensure discharge doesn't flow to neighbor's property"
    - "Install freeze guard (pop-off discharge) in cold climates"

  warning_signs:
    pump_problems:
      - "Runs continuously (stuck float or high water table)"
      - "Cycles on/off rapidly (short cycling)"
      - "Doesn't turn on when water rises"
      - "Makes grinding or rattling noises"
      - "Vibrates excessively"
    system_problems:
      - "Water backing up around pump"
      - "Pump runs but pit doesn't empty"
      - "Burning smell from motor"

  emergency_preparation:
    - "Keep backup battery charged"
    - "Have wet-dry vacuum available"
    - "Know emergency plumber number"
    - "Consider portable backup pump"
    - "Install high-water alarm: [SUMP_ALARM_INFO]"

  diy_vs_pro:
