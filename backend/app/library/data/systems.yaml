garbage_disposal:
  title: "Garbage Disposal Maintenance"
  feature: has_garbage_disposal
  section: 5
  category: systems
  overview: "Garbage disposals need proper use and regular cleaning to work well and avoid jams. Most problems are user-caused and easily preventable."

  your_disposal:
    location: "[DISPOSAL_LOCATION]"
    reset_button: "[DISPOSAL_RESET_LOCATION]"  # usually bottom of unit
    shutoff: "[DISPOSAL_SHUTOFF]"  # usually same switch as outlet

  proper_use:
    always_do:
      - "Run COLD water before, during, and 15 seconds after grinding"
      - "Feed food waste gradually — don't overload"
      - "Cut large items into smaller pieces"
      - "Run regularly to prevent rust and corrosion"
    never_do:
      - "Grease, oil, or fat — coats pipes, causes clogs"
      - "Fibrous foods — celery, corn husks, artichokes, asparagus"
      - "Starchy foods in quantity — pasta, rice, potato peels"
      - "Coffee grounds — accumulate in pipes"
      - "Bones larger than chicken bones"
      - "Egg shells — contrary to myth, they dull blades"
      - "Non-food items — glass, plastic, metal, paper"
      - "Harsh chemicals or drain cleaners"

  weekly_cleaning:
    ice_cube_method:
      - "1. Run cold water"
      - "2. Drop in 2 cups of ice cubes"
      - "3. Turn on disposal"
      - "4. Let run until ice is gone"
      - "5. Purpose: Cleans blades and walls"
    citrus_freshening:
      - "After ice cleaning, grind citrus peel (lemon, orange)"
      - "Natural deodorizer and cleaner"

  monthly_deep_clean:
    - step: "1. Turn off power to disposal"
    - step: "2. Clean splash guard"
      how: "Lift flaps, scrub with brush and dish soap"
    - step: "3. Clean inside walls"
      how: "Use disposal brush or old toothbrush"
    - step: "4. Baking soda and vinegar"
      how: "Pour 1/2 cup baking soda, add 1 cup vinegar, let fizz, flush with hot water"
    - step: "5. Restore power"

  troubleshooting:
    disposal_wont_run:
      - "1. Check if humming — if so, it's jammed (see below)"
      - "2. Check reset button on bottom of unit — press firmly"
      - "3. Check circuit breaker"
      - "4. If nothing, motor may have failed"
    disposal_jammed:
      - "1. Turn OFF disposal (switch and breaker)"
      - "2. NEVER put hand inside"
      - "3. Use hex wrench in bottom center hole — rotate back and forth"
      - "4. Alternative: Use wooden broom handle from top to rotate"
      - "5. Remove loosened debris with tongs"
      - "6. Press reset button"
      - "7. Turn on water, then disposal"
    disposal_leaking:
      - "From top: Sink flange seal — may need tightening or plumber's putty"
      - "From side: Dishwasher connection — tighten hose clamp"
      - "From bottom: Internal seal failure — usually means replacement"
    bad_odor:
      - "Clean splash guard (most common source)"
      - "Run ice cubes and citrus"
      - "Check for stuck food underneath splash guard"

  diy_vs_pro:
    diy_tasks:
      - "Proper use education"
      - "Ice and citrus cleaning"
      - "Deep cleaning"
      - "Unjamming with hex wrench"
      - "Pressing reset button"
    call_plumber:
      - "Leaking from bottom (replacement needed)"
      - "Won't reset after unjamming"
      - "Motor doesn't respond at all"
      - "Electrical issues"

