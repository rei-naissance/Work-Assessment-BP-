radon_mitigation:
  title: "Radon Mitigation System Maintenance"
  feature: has_radon_mitigation
  section: 5
  category: systems
  overview: "Radon mitigation systems run continuously to keep radon levels safe. A simple monthly check confirms your system is protecting your family."

  your_system:
    type: "[RADON_SYSTEM_TYPE]"  # sub-slab suction, drain tile suction, sump depressurization
    fan_location: "[RADON_FAN_LOCATION]"
    manometer_location: "[MANOMETER_LOCATION]"
    exhaust_point: "[RADON_EXHAUST_LOCATION]"
    install_date: "[RADON_SYSTEM_INSTALL_DATE]"

  monthly_check:
    manometer_reading:
      what: "U-tube gauge showing system is pulling negative pressure"
      normal: "Fluid levels uneven (one side higher) — indicates suction"
      problem: "Fluid levels EQUAL — fan may have failed"
      location: "[MANOMETER_LOCATION]"
    fan_check:
      - "Feel pipe near fan — should sense slight suction or vibration"
      - "Listen for fan running (may be subtle)"
      - "Check for error lights if fan has indicator"
    visual_inspection:
      - "Pipe connections tight"
      - "No visible damage to piping"
      - "Exterior exhaust clear of obstructions"

  annual_maintenance:
    - task: "Radon retest"
      frequency: "Every 2 years, or after any foundation work"
      method: "Short-term test kit or continuous monitor"
      target: "Below 4 pCi/L (below 2 pCi/L is ideal)"
    - task: "Inspect foundation seals"
      check: "Cracks, sump lid seal, floor-wall joint"
      action: "Reseal any gaps that have opened"
    - task: "Check exhaust pipe"
      verify: "Clear of debris, snow, bird nests"

  fan_replacement:
    lifespan: "Most fans last 5-10 years"
    signs_of_failure:
      - "Manometer shows no pressure differential"
      - "No sound or vibration from fan"
      - "Radon levels increase on retest"
    replacement_note: "Requires matching correct fan type and installation"

  if_levels_increase:
    immediate_steps:
      - "Check that fan is running"
      - "Verify manometer shows suction"
      - "Inspect foundation for new cracks or unsealed areas"
      - "Check sump pit lid seal"
    if_system_working_but_levels_high:
      - "May need system enhancement"
      - "Additional suction points"
      - "More powerful fan"
      - "Call radon professional for evaluation"

  radon_testing:
    short_term_test: "2-7 days — good for initial check"
    long_term_test: "90+ days — gives average reading"
    continuous_monitor: "Best for ongoing monitoring"
    when_to_test:
      - "Every 2 years routinely"
      - "After foundation cracks appear"
      - "After foundation waterproofing"
      - "After major renovation"
      - "If fan replaced"

  diy_vs_pro:
    diy_tasks:
      - "Monthly manometer check"
      - "Fan operation check"
      - "Radon test kit placement"
      - "Visual inspections"
    call_pro:
      - "Fan replacement"
      - "System not maintaining pressure"
      - "Radon levels still high"
      - "Foundation seal work"
      - "System enhancement"

  regional_note: "Radon levels vary significantly by location. Some areas of the Southeast have elevated radon potential, especially in foothill and mountain regions."

  contacts:
    radon_contractor: "[RADON_CONTRACTOR] — [RADON_CONTRACTOR_PHONE]"
    test_kit_source: "[RADON_TEST_SOURCE]"

