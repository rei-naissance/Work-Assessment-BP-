      - "Clean inlet filter screen every 6 months"
      - "Check for error codes on display"
      - "Ensure venting clear (gas units)"
    common_issues:
      - "Error codes — consult manual or call service"
      - "Fluctuating temperatures — may need descaling"
      - "No hot water — check gas/electric, flow sensor"

  emergency_shutoff:
    water: "[WH_SHUTOFF_LOCATION] — turn clockwise"
    gas: "Turn valve perpendicular to pipe"
    electric: "Breaker in panel: [WH_BREAKER_LOCATION]"
    when_to_shut_off:
