garage_maintenance:
  title: "Garage Door & Workspace Maintenance"
  feature: has_garage
  section: 5
  category: systems
  overview: "Garage door is the largest moving part in your home and a major security point. Regular maintenance prevents costly repairs and dangerous failures."

  your_garage_info:
    door_type: "[GARAGE_DOOR_TYPE]"  # sectional, roll-up, swing-out
    opener_brand: "[GARAGE_OPENER_BRAND]"
    opener_location: "[GARAGE_OPENER_LOCATION]"
    manual_release: "[GARAGE_MANUAL_RELEASE_LOCATION]"

  monthly_tasks:
    - task: "Test auto-reverse safety"
      how: "Place 2x4 flat on floor in door path. Door must reverse when it contacts the board."
      warning: "If door doesn't reverse, DO NOT USE until fixed — this is a critical safety feature"
    - task: "Test photo-eye sensors"
      how: "Wave object through beam while door is closing — should reverse immediately"
      location: "Sensors are [GARAGE_SENSOR_HEIGHT] from floor on each side"
    - task: "Visual inspection"
      check: "Cables, springs, rollers, hinges for wear or damage"
    - task: "Listen for unusual sounds"
      concern: "Grinding, scraping, or popping indicates problem"

  biannual_maintenance:
    title: "Every 6 Months"
    tasks:
      - task: "Lubricate moving parts"
        parts: "Rollers, hinges, springs, bearing plates"
        use: "White lithium grease or silicone spray — NOT WD-40"
        avoid: "Don't lubricate the track — causes buildup"
      - task: "Tighten hardware"
        check: "Bracket bolts, hinge screws, track mounting"
      - task: "Check weatherstripping"
        location: "Bottom seal and side/top seals"
        replace_if: "Cracked, brittle, or gaps visible"
      - task: "Test manual release"
        how: "Pull red cord, lift door manually — should move freely"
      - task: "Check door balance"
        how: "Disconnect opener, lift door halfway — should stay in place"
        warning: "If door falls or rises, springs need adjustment (CALL PRO)"

  annual_tasks:
    - "Inspect springs for rust, gaps, or elongation"
    - "Check cables for fraying or wear"
    - "Clean and lubricate chain or belt drive"
    - "Test wall button and remote batteries"
    - "Update opener code if sharing with service providers"

  safety_warnings:
    - icon: "⚠️"
      warning: "NEVER attempt to adjust or replace torsion springs yourself"
      reason: "Under extreme tension — can cause serious injury or death"
    - icon: "⚠️"
      warning: "Do not stand under a moving garage door"
    - icon: "⚠️"
      warning: "Keep fingers away from section joints when door is moving"
    - icon: "⚠️"
      warning: "Extension springs should have safety cables through them"

  workspace_maintenance:
    - "Keep clear path from door to house entry for emergency exit"
    - "Store flammables (gas cans, solvents) in approved containers away from ignition sources"
    - "Install GFCI outlets for power tools — required by code"
    - "Ensure adequate lighting — minimum 50 lumens per square foot for workspace"
    - "Keep fire extinguisher accessible: [GARAGE_EXTINGUISHER_LOCATION]"
    - "Never run vehicle in closed garage — CO poisoning risk"

  diy_vs_pro:
    diy_safe:
      - "Lubrication of rollers, hinges"
      - "Tightening loose hardware"
      - "Replacing weatherstripping"
      - "Testing safety features"
      - "Replacing remote batteries"
      - "Cleaning tracks"
    call_pro_immediately:
      - "ANY spring work (torsion or extension)"
      - "Cable replacement"
      - "Door off track"
      - "Opener motor failure"
      - "Panel replacement"
      - "Door balance problems"

  contacts:
    garage_door_service: "[GARAGE_DOOR_SERVICE] — [GARAGE_DOOR_PHONE]"

