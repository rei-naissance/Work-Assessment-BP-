sprinkler_system:
  title: "Irrigation & Sprinkler System"
  feature: has_sprinklers
  section: 5
  category: systems
  overview: "Automated irrigation saves water when properly maintained but wastes thousands of gallons when neglected. Seasonal adjustment and regular inspections maximize efficiency."

  your_system_info:
    controller_location: "[IRRIGATION_CONTROLLER_LOCATION]"
    main_shutoff: "[IRRIGATION_MAIN_SHUTOFF]"
    zone_count: "[IRRIGATION_ZONE_COUNT] zones"
    zone_map: "[IRRIGATION_ZONE_MAP_LOCATION]"
    backflow_preventer: "[BACKFLOW_PREVENTER_LOCATION]"
    rain_sensor: "[RAIN_SENSOR_LOCATION]"

  spring_startup:
    title: "Annual Spring Activation (March-April)"
    steps:
      - step: "1. Inspect backflow preventer"
        action: "Check for winter damage, ensure valves are closed"
      - step: "2. Slowly open main water supply"
        action: "Turn gradually to prevent water hammer"
        location: "[IRRIGATION_MAIN_SHUTOFF]"
      - step: "3. Pressurize system slowly"
        action: "Open backflow valves one at a time"
      - step: "4. Run each zone manually"
        action: "Walk the zone, inspect every head"
        check: "Coverage, spray pattern, leaks, clogs"
      - step: "5. Adjust heads as needed"
        action: "Clean clogged nozzles, adjust spray arcs, raise sunken heads"
      - step: "6. Check rain sensor operation"
        action: "Test per manufacturer instructions"
      - step: "7. Program controller"
        action: "Set spring schedule — typically 2-3 days/week"

  monthly_maintenance:
    - task: "Inspect one zone per week (rotate through all zones monthly)"
      check: "Spray patterns, head condition, coverage gaps"
    - task: "Check controller display"
      verify: "Correct date/time, no error messages, battery backup working"
    - task: "Observe a full cycle"
      look_for: "Runoff, dry spots, overspray on hardscape"
    - task: "Check rain sensor"
      verify: "Activates after rain, resets when dry"
    - task: "Monitor water bill"
      concern: "Unexpected increase may indicate leak"

  seasonal_adjustments:
    spring:
      frequency: "2-3 days per week"
      notes: "Increase gradually as temperatures rise"
    summer:
      frequency: "3-4 days per week (or as needed)"
      notes: "Water deeply, less frequently — promotes deep roots"
      best_time: "Early morning (4-6 AM) — reduces evaporation and disease"
    fall:
      frequency: "1-2 days per week"
      notes: "Reduce as temperatures cool and growth slows"
    winter:
      frequency: "Off or monthly deep watering (depends on climate)"
      notes: "Winterize system before first freeze"

  watering_best_practices:
    - "Water early morning — 4-6 AM ideal"
    - "Avoid watering midday — up to 50% lost to evaporation"
    - "Don't water late evening — promotes fungal disease"
    - "Adjust for rain — skip cycle or reduce runtime after rainfall"
    - "Water deeply but infrequently — promotes deep root growth"
    - "Check soil moisture before watering — may not need scheduled cycle"

  winterization:
    title: "Fall Winterization (Before First Freeze)"
    steps:
      - step: "1. Shut off water supply"
        location: "[IRRIGATION_MAIN_SHUTOFF]"
      - step: "2. Turn controller to 'off' or 'rain' mode"
        note: "Leave power on to preserve programming"
      - step: "3. Open drain valves"
        location: "[DRAIN_VALVE_LOCATIONS]"
      - step: "4. Blow out lines with compressed air"
        spec: "50-80 PSI maximum — higher pressure damages components"
        method: "Start with farthest zone, work toward controller"
        note: "Run each zone until no water visible (about 2 minutes)"
      - step: "5. Insulate backflow preventer"
        method: "Cover with insulation bag or wrap"
      - step: "6. Insulate above-ground pipes"
    warning: "Water left in lines will freeze and crack pipes, fittings, and heads"

  troubleshooting:
    head_not_popping_up:
      causes: "Clogged nozzle, debris in head, low pressure"
      fix: "Clean or replace head, check for leaks upstream"
    low_pressure_zone:
      causes: "Leak in line, too many heads on zone, valve problem"
      fix: "Check for wet spots indicating leak, inspect valve"
    dead_spots:
      causes: "Clogged nozzle, head turned wrong direction, spacing too wide"
      fix: "Clean nozzle, adjust head, consider adding head"
    runoff:
      causes: "Watering too long, soil compaction, wrong head type"
      fix: "Split into multiple shorter cycles, aerate lawn, adjust output"
    controller_not_running:
      check: "Power, blown fuse, tripped GFCI, backup battery"

  water_conservation:
    - "Install rain sensor if not equipped — [RAIN_SENSOR_LOCATION]"
    - "Consider smart controller with weather-based adjustments"
    - "Use drip irrigation for beds — reduces water use 50%+"
    - "Audit system annually — fix leaks and adjust coverage"
    - "Match precipitation rates across zones"
    - "Follow local watering restrictions: [LOCAL_WATERING_RULES]"

  diy_vs_pro:
    diy_tasks:
      - "Head cleaning and adjustment"
      - "Replacing sprinkler heads"
      - "Programming controller"
      - "Monthly inspections"
      - "Installing rain sensor"
    call_pro:
      - "Spring startup (if unfamiliar)"
      - "Winterization / blowout"
      - "Valve repairs"
      - "Main line repairs"
      - "Backflow preventer testing (required annually in some areas)"
      - "Adding new zones"

  regional_note: "Southeast: Humid climate may allow less frequent watering than arid regions. Summer afternoon thunderstorms — use rain sensor to skip unnecessary cycles. Check local watering restrictions — many areas limit days/hours."

  contacts:
    irrigation_service: "[IRRIGATION_COMPANY] — [IRRIGATION_PHONE]"
    backflow_tester: "[BACKFLOW_TESTER] — [BACKFLOW_PHONE]"

