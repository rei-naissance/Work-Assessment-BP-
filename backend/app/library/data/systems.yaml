water_softener:
  title: "Water Softener Maintenance"
  feature: has_water_softener
  section: 5
  category: systems
  overview: "Water softeners need regular salt refills and occasional cleaning to work properly. Neglected systems waste salt and fail to soften water effectively."

  your_softener:
    location: "[WATER_SOFTENER_LOCATION]"
    type: "[SOFTENER_TYPE]"  # ion exchange, salt-free
    settings: "[SOFTENER_SETTINGS]"
    salt_type: "[SALT_TYPE_USED]"
    regeneration_schedule: "[REGENERATION_SCHEDULE]"

  monthly_tasks:
    - task: "Check salt level"
      minimum: "Keep salt at least 1/3 full"
      tip: "Set calendar reminder to check monthly"
    - task: "Inspect for salt bridges"
      what: "Hard crust above water level — salt looks full but system starves"
      how_to_check: "Push broom handle into salt — should break through easily"
      fix: "Break up crust with broom handle, do not use sharp tools"
    - task: "Check for salt mushing"
      what: "Soft sludge at bottom of tank"
      sign: "Poor softening despite adequate salt level"
      fix: "Clean out brine tank, may need professional"

  biannual_maintenance:
    - task: "Clean resin tank"
      how: "Use resin cleaner per manufacturer instructions"
      when: "Every 6-12 months, or if water seems less soft"
    - task: "Clean brine tank"
      when: "Annually, or if salt bridging/mushing occurs"
      steps:
        - "1. Use up salt or scoop out remaining"
        - "2. Disconnect brine line"
        - "3. Remove and clean brine components"
        - "4. Wash tank with soap and water"
        - "5. Reassemble and refill with salt"

  salt_selection:
    types:
      - type: "Pellets"
        best_for: "Most residential softeners — cleanest, most common"
      - type: "Crystals"
        note: "More affordable, may bridge more easily"
      - type: "Blocks"
        note: "Only for specific softeners designed for them"
    quality: "Higher purity salt = less residue and bridging"
    never_use: "Rock salt — contains impurities that clog system"

  settings_optimization:
    hardness_setting: "Match to actual water hardness (test or check utility report)"
    regeneration_frequency: "Depends on water use and hardness"
    regeneration_time: "Schedule for low-use time (usually 2-3 AM)"
    consider: "Demand-initiated regeneration (only regenerates when needed)"

  troubleshooting:
    water_not_soft:
      - "Check salt level"
      - "Break up salt bridge if present"
      - "Verify hardness setting matches water supply"
      - "Check bypass valve — ensure not in bypass"
      - "Clean resin with resin cleaner"
    salt_not_going_down:
      - "Salt bridge — break up crust"
      - "Regeneration not occurring — check timer/settings"
    water_in_salt_tank:
      - "Some water is normal (for brine)"
      - "Excessive water = clogged drain or stuck valve"

  diy_vs_pro:
    diy_tasks:
      - "Adding salt"
      - "Breaking up salt bridges"
      - "Using resin cleaner"
      - "Adjusting settings"
      - "Cleaning brine tank"
    call_pro:
      - "System not regenerating"
      - "Salt not going down (after checking bridge)"
      - "Resin tank issues"
      - "Persistent soft water failure"
      - "Major component replacement"

  contacts:
