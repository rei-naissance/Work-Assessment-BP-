water_filtration:
  title: "Water Filtration System Maintenance"
  feature: has_water_filtration
  section: 5
  category: systems
  overview: "Water filtration systems only work if filters are replaced on schedule. Neglected filters lose effectiveness and can harbor bacteria."

  your_system:
    type: "[FILTRATION_TYPE]"  # under-sink, whole-house, reverse osmosis, UV
    location: "[FILTRATION_LOCATION]"
    filter_types: "[FILTER_TYPES_INSTALLED]"
    install_date: "[FILTRATION_INSTALL_DATE]"

  filter_replacement_schedule:
    sediment_filter:
      frequency: "Every 3-6 months"
      sign_to_replace: "Visible discoloration, reduced flow"
    carbon_filter:
      frequency: "Every 6-12 months"
      sign_to_replace: "Bad taste returns, odor in water"
    reverse_osmosis_membrane:
      frequency: "Every 2-3 years"
      sign_to_replace: "TDS levels increasing"
    uv_bulb:
      frequency: "Annually"
      note: "Output decreases even if bulb still lights"
    post_filters:
      frequency: "Every 6-12 months"
      purpose: "Final polishing before tap"

  monthly_checks:
    - task: "Check for leaks"
      locations: "Around housing, fittings, connections"
    - task: "Monitor water flow"
      concern: "Reduced flow indicates filter clogging"
    - task: "Check pressure gauges (if equipped)"
      indicator: "Large pressure drop = filter needs replacing"

  annual_maintenance:
    - task: "Replace all filters per schedule"
    - task: "Sanitize system (per manufacturer)"
      how: "Usually involves bleach solution through system"
    - task: "Test water quality"
      verify: "System is working properly"
    - task: "Inspect for leaks and wear"

  reverse_osmosis_specific:
    components:
