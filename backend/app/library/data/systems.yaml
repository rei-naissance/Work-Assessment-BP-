washer_dryer:
  title: "Washer & Dryer Maintenance"
  feature: has_washer_dryer
  section: 5
  category: systems
  overview: "Dryer lint is the leading cause of laundry room fires. Regular cleaning and hose inspection prevent fires, flooding, and extend appliance life significantly."

  your_laundry_info:
    washer_location: "[WASHER_LOCATION]"
    dryer_location: "[DRYER_LOCATION]"
    dryer_type: "[DRYER_TYPE]"  # gas, electric
    water_shutoffs: "[LAUNDRY_SHUTOFF_LOCATIONS]"
    dryer_vent_path: "[DRYER_VENT_PATH]"

  every_load:
    dryer:
      - "Clean lint trap before every load"
      - "Never run dryer with lint trap missing"
    washer:
      - "Remove wet clothes promptly (prevents mold/mildew)"
      - "Leave door ajar after load to dry interior"

  monthly_maintenance:
    washer:
      - task: "Run cleaning cycle"
        how: "Empty hot cycle with washer cleaner, bleach, or white vinegar"
        purpose: "Prevents mold, mildew, and odors"
      - task: "Clean detergent dispenser"
        how: "Remove, soak in hot water, scrub buildup"
      - task: "Wipe door seal (front-loaders)"
        check: "Mold in gasket folds — clean with diluted bleach"
      - task: "Check drain filter (if equipped)"
        location: "Front bottom panel on many models"
    dryer:
      - task: "Vacuum lint housing"
        how: "Remove lint trap, vacuum inside the slot"
      - task: "Check exhaust vent flap outside"
        ensure: "Opens when dryer runs, closes when off"
        concern: "Stuck open = pest entry; stuck closed = fire risk"

  annual_maintenance:
    washer_hoses:
      - "Inspect supply hoses for bulges, cracks, or brittleness"
      - "Replace rubber hoses every 3-5 years (even if they look fine)"
      - "Upgrade to stainless steel braided hoses"
      - "Ensure connections are tight but not overtightened"
      - "Turn off valves if leaving for extended period"
    dryer_vent_cleaning:
      - "Disconnect vent from dryer"
      - "Clean entire duct run to exterior (brush kit or vacuum)"
      - "Remove lint from exterior vent hood"
      - "Check for crushed or kinked duct sections"
      - "Replace flexible foil duct with rigid metal (fire safety)"
      - "Consider professional cleaning if duct is long or has many bends"

  dryer_fire_prevention:
    critical_safety:
      - "NEVER leave dryer running when not home or asleep"
      - "Clean lint trap every load — no exceptions"
      - "Clean vent duct annually"
      - "Use only rigid metal ductwork (not plastic or foil)"
      - "Maximum duct length: 25 feet with no bends (subtract 5' per elbow)"
      - "Never vent dryer into garage, attic, or crawlspace"
    warning_signs:
      - "Clothes take longer than one cycle to dry"
      - "Dryer or clothes very hot after cycle"
      - "Burning smell"
      - "Exterior vent doesn't open when dryer runs"
      - "Laundry room more humid than usual"

  washer_flooding_prevention:
    - "Turn off supply valves when traveling"
    - "Use stainless steel braided hoses"
    - "Install flood sensor/alarm behind washer"
    - "Know how to quickly shut off water"
    - "Consider automatic shutoff valves"

  leveling:
