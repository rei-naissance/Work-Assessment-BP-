basement_care:
  title: "Basement Care & Waterproofing"
  feature: has_basement
  section: 5
  category: systems
  overview: "Basements are prone to moisture problems that lead to mold, structural damage, and unhealthy air quality. Proactive monitoring prevents disasters."

  your_basement_info:
    type: "[BASEMENT_TYPE]"  # finished, unfinished, partial, walkout
    sump_pump: "[SUMP_PUMP_LOCATION]"
    floor_drain: "[BASEMENT_FLOOR_DRAIN_LOCATION]"
    dehumidifier: "[DEHUMIDIFIER_LOCATION]"
    water_entry_history: "[KNOWN_WATER_ENTRY_POINTS]"

  weekly_monitoring:
    - task: "Check humidity level"
      target: "Keep below 50% — ideally 30-50%"
      tool: "Hygrometer: [HYGROMETER_LOCATION]"
    - task: "Visual inspection after rain"
      check: "Walls, floor, window wells for dampness or stains"
    - task: "Check dehumidifier"
      action: "Empty reservoir or verify drain line is clear"
    - task: "Sniff test"
      concern: "Musty smell indicates moisture problem even if not visible"

  monthly_tasks:
    - task: "Inspect foundation walls"
      look_for: "New cracks, efflorescence (white mineral deposits), damp spots"
    - task: "Check window wells"
      ensure: "Drains are clear, no debris accumulation"
    - task: "Test sump pump"
      how: "Pour 5 gallons water into pit — pump should activate and drain"
      location: "[SUMP_PUMP_LOCATION]"
    - task: "Clean dehumidifier filter"
      how: "Rinse or vacuum per manufacturer instructions"

  seasonal_tasks:
    spring:
      - "Inspect after snowmelt for water intrusion signs"
      - "Clear debris from window well drains"
      - "Check grading around foundation — soil should slope away"
      - "Verify downspouts discharge 6+ feet from foundation"
    fall:
      - "Seal any new foundation cracks before freeze"
      - "Insulate exposed pipes to prevent freezing"
      - "Test sump pump and backup battery"
      - "Clear gutters to prevent overflow near foundation"

  water_intrusion_response:
    immediate_steps:
      - "1. Identify source if visible (wall crack, floor joint, window)"
      - "2. Move valuables and electronics to dry area"
      - "3. If significant water, check sump pump operation"
      - "4. Use wet-dry vacuum to remove standing water"
      - "5. Set up fans and dehumidifier to dry area"
      - "6. Document with photos for insurance if applicable"
    call_pro_if:
      - "Water entering through multiple locations"
      - "Pump cannot keep up with water volume"
      - "Sewage backup (DO NOT touch — biohazard)"
      - "Foundation crack is widening"
      - "Water damage exceeds small area"

  crack_assessment:
    hairline_cracks:
      description: "Very thin, stable cracks in concrete"
      action: "Monitor for changes, seal with hydraulic cement or epoxy"
      concern_level: "Low — usually cosmetic"
    horizontal_cracks:
      description: "Cracks running horizontally along wall"
      action: "CALL STRUCTURAL ENGINEER IMMEDIATELY"
      concern_level: "HIGH — indicates foundation pressure/failure"
    stair_step_cracks:
      description: "Cracks following mortar joints in block walls"
      action: "Monitor closely, consult professional if growing"
      concern_level: "Moderate to High — potential structural issue"
    vertical_cracks:
      description: "Cracks running top to bottom"
      action: "Usually settling — seal and monitor"
      concern_level: "Low to Moderate"

  humidity_control:
    - "Run dehumidifier continuously in humid months (May-September in Southeast)"
    - "Ensure dryer vents to outside, not into basement"
    - "Don't hang wet laundry in basement"
    - "Use vapor barrier on dirt floors"
    - "Consider basement ventilation fan if persistently damp"

  storage_best_practices:
    - "Store items on shelving, minimum 4 inches off floor"
    - "Use plastic bins instead of cardboard boxes"
    - "Keep stored items 12 inches from walls"
    - "Don't store irreplaceable items in basement"
    - "Elevate appliances if flooding history exists"

  diy_vs_pro:
    diy_tasks:
      - "Sealing hairline cracks with hydraulic cement"
      - "Applying waterproof paint to walls"
      - "Improving exterior grading"
      - "Extending downspouts"
      - "Testing and maintaining sump pump"
    call_pro:
      - "Horizontal or stair-step foundation cracks"
      - "Interior French drain installation"
      - "Exterior waterproofing membrane"
      - "Sump pump installation or major repair"
      - "Mold remediation over 10 sq ft"

  regional_note: "Southeast: Heavy summer thunderstorms can overwhelm drainage. Battery backup for sump pump is essential — power outages often coincide with storms. Clay soil common in Piedmont region holds water against foundation."

  contacts:
    waterproofing_contractor: "[WATERPROOFING_COMPANY] — [WATERPROOFING_PHONE]"
    structural_engineer: "[STRUCTURAL_ENGINEER] — [STRUCTURAL_PHONE]"
    mold_remediation: "[MOLD_COMPANY] — [MOLD_PHONE]"

