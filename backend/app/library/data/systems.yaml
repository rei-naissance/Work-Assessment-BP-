    location: "[CHARGER_LOCATION]"
    circuit: "[CHARGER_CIRCUIT_INFO]"
    installation_date: "[CHARGER_INSTALL_DATE]"

  monthly_inspection:
    - task: "Inspect connector and cable"
      look_for: "Cracks, fraying, cuts, burn marks, bent pins"
      action: "Discontinue use and call electrician if damage found"
    - task: "Check cable for kinks or damage"
      note: "Don't store cable tightly wound — causes internal damage"
    - task: "Verify indicator lights work normally"
      check: "Consult manual for light meanings"
    - task: "Test charge initiation"
      verify: "Vehicle connects and charges properly"

  quarterly_tasks:
    - task: "Clean connector contacts"
      how: "Dry cloth only — no liquids or cleaners"
    - task: "Inspect mounting"
      check: "Securely attached, no looseness"
    - task: "Check for firmware updates"
      how: "Through manufacturer app or website"
    - task: "Test ground fault protection"
      how: "Most units have test button — should trip and reset"

  annual_inspection:
    professional_check:
      - "Electrical connections tight and not overheating"
      - "Breaker correctly sized and functioning"
      - "Grounding intact"
      - "Overall system condition"

  safety_practices:
    - "Keep charging area dry — avoid charging in rain if exposed"
    - "Don't use extension cords with Level 2 chargers"
    - "Keep connector off ground when not in use"
    - "Don't charge with damaged cable or connector"
    - "Ensure adequate ventilation around charger"

  troubleshooting:
    not_charging:
