# =============================================================================
# SYSTEMS.YAML — Feature-Specific Home Systems Maintenance
# =============================================================================
# Premium actionable guides for homes with specific features/systems
# Each module includes: overview, maintenance schedule, DIY steps, safety, pro thresholds
# =============================================================================

pool_care:
  title: "Pool Maintenance Guide"
  feature: has_pool
  section: 5
  category: systems
  overview: "Complete pool maintenance program to keep water safe, equipment running, and surfaces protected. Regular care prevents costly repairs and health hazards."

  your_pool_info:
    type: "[POOL_TYPE]"  # inground, above-ground, saltwater, chlorine
    volume: "[POOL_GALLONS] gallons"
    equipment_location: "[POOL_EQUIPMENT_LOCATION]"
    main_drain: "[POOL_DRAIN_LOCATION]"

  weekly_maintenance:
    title: "Weekly Tasks (During Swim Season)"
    tasks:
      - task: "Test water chemistry"
        details: "pH (7.2-7.6), chlorine (1-3 ppm), alkalinity (80-120 ppm)"
        tools: "Test strips or liquid test kit"
      - task: "Skim surface debris"
        details: "Remove leaves, bugs, and floating debris"
      - task: "Empty skimmer baskets"
        location: "[SKIMMER_BASKET_LOCATION]"
      - task: "Empty pump strainer basket"
        location: "[PUMP_STRAINER_LOCATION]"
      - task: "Brush walls and tile line"
        details: "Prevents algae buildup and calcium deposits"
      - task: "Vacuum pool floor"
        details: "Manual or automatic — check cleaner operation"
      - task: "Check water level"
        details: "Should be at middle of skimmer opening"

  monthly_maintenance:
    - "Shock the pool (super-chlorinate) — do at dusk, not midday"
    - "Clean filter per type: backwash (sand/DE) or rinse (cartridge)"
    - "Inspect pump for leaks, unusual noise, or reduced flow"
    - "Check automatic cleaner for wear — replace worn parts"
    - "Lubricate O-rings on pump lid and filter"
    - "Test and calibrate automatic chemical feeder if equipped"

  seasonal_tasks:
    spring_opening:
      - "Remove and clean cover — store dry to prevent mold"
      - "Reinstall ladders, rails, and accessories"
      - "Prime and start pump — check for air leaks"
      - "Shock pool heavily — may need multiple treatments"
      - "Run filter 24 hours until water clears"
      - "Balance all chemicals before swimming"
    fall_closing:
      - "Balance water chemistry one final time"
      - "Lower water level below skimmer"
      - "Blow out plumbing lines with shop vac or compressor"
      - "Add winterizing chemicals"
      - "Install winter plugs in return jets"
      - "Install and secure pool cover"
      - "Shut off pump, filter, heater at breakers"

  chemical_safety:
    - "NEVER mix different pool chemicals — can cause toxic gas or explosion"
    - "Add chemicals to water, never water to chemicals"
    - "Store chemicals in cool, dry place away from sunlight"
    - "Keep chlorine and acid separated by at least 10 feet"
    - "Wear gloves and eye protection when handling chemicals"
    - "Wash hands thoroughly after pool maintenance"

  troubleshooting:
    green_water:
      cause: "Algae bloom — low chlorine, high pH, or poor circulation"
      fix: "Shock heavily, brush walls, run filter 24/7 until clear, backwash frequently"
    cloudy_water:
      cause: "Poor filtration, high pH, or calcium buildup"
      fix: "Check filter pressure, balance pH, use clarifier if needed"
    pump_losing_prime:
      cause: "Air leak in suction line, low water level, or clogged impeller"
      fix: "Check lid O-ring, water level, and skimmer baskets first"
    high_chlorine_demand:
      cause: "Organic contamination or stabilizer (CYA) too low"
      fix: "Test CYA level, consider partial drain/refill if over 100 ppm"

  diy_vs_pro:
    diy_tasks:
      - "Weekly testing and chemical adjustments"
      - "Skimming, brushing, vacuuming"
      - "Filter cleaning and backwashing"
      - "Basic equipment inspection"
      - "Winterizing (with proper research)"
    call_pro:
      - "Pump motor replacement or electrical issues"
      - "Heater repair or gas line work"
      - "Leak detection and repair"
      - "Major equipment installation"
      - "Replastering or liner replacement"
      - "Opening/closing if unfamiliar with process"

  regional_note: "Southeast humidity accelerates algae growth — may need more frequent shocking. Hurricane season: lower water level, remove loose items, do NOT drain pool (hydrostatic pressure can pop it out of ground)."

  contacts:
    pool_service: "[POOL_SERVICE_NAME] — [POOL_SERVICE_PHONE]"
    equipment_warranty: "[POOL_EQUIPMENT_WARRANTY_INFO]"

