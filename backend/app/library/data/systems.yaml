smart_home:
  title: "Smart Home System Maintenance"
  feature: has_smart_home
  section: 5
  category: systems
  overview: "Smart home devices need regular updates and battery replacements to remain secure and functional. Neglected systems become security vulnerabilities."

  your_smart_home:
    hub: "[SMART_HOME_HUB]"
    hub_location: "[HUB_LOCATION]"
    wifi_router: "[WIFI_ROUTER_MODEL]"
    devices: "[SMART_DEVICE_LIST]"

  monthly_maintenance:
    - task: "Check for firmware updates"
      devices: "Hub, thermostat, locks, cameras, sensors"
      why: "Security patches and bug fixes"
    - task: "Verify all devices are online"
      how: "Check app status for each device"
    - task: "Test automations"
      verify: "Schedules and routines still work as expected"
    - task: "Review user access"
      check: "Remove old guest codes, revoked users"

  quarterly_tasks:
    - task: "Check battery levels in sensors and locks"
      replace: "When below 20%, or proactively at 30%"
      tip: "Replace all batteries same type at once"
    - task: "Test smart locks"
      verify: "Manual, keypad, and app control all work"
    - task: "Test smart smoke/CO detectors"
      verify: "Alert reaches phone when tested"
    - task: "Review connected devices list"
      action: "Remove any unknown or unused devices"

  security_best_practices:
    network:
      - "Use strong, unique WiFi password"
      - "Enable WPA3 if router supports"
      - "Consider separate IoT network/VLAN"
      - "Regularly update router firmware"
    accounts:
      - "Use unique passwords for each smart home service"
      - "Enable two-factor authentication everywhere available"
      - "Review account activity periodically"
      - "Use password manager"
    devices:
      - "Change default passwords on all devices"
      - "Disable features you don't use"
      - "Keep firmware updated"
      - "Only buy from reputable manufacturers"

  troubleshooting:
    device_offline:
      - "Check device power and battery"
      - "Verify WiFi is working"
      - "Restart device"
      - "Restart hub/router"
      - "Check for range issues"
    automation_not_working:
      - "Verify trigger conditions correct"
      - "Check device is online"
      - "Review recent app or firmware updates"
      - "Recreate automation"
    slow_response:
      - "Check WiFi signal strength"
      - "Too many devices on network"
      - "Hub overloaded — reduce automations"

  battery_schedule:
    door_window_sensors: "Every 1-2 years"
    motion_sensors: "Every 1-2 years"
    smart_locks: "Every 6-12 months"
    smart_buttons: "Every 1-2 years"
    smoke_co_detectors: "Per manufacturer (usually annual test reminder)"
    tip: "Replace proactively before failure"

  backup_and_recovery:
