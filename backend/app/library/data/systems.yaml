fireplace_care:
  title: "Fireplace & Chimney Maintenance"
  feature: has_fireplace
  section: 5
  category: systems
  overview: "Fireplaces require annual professional inspection to prevent chimney fires and carbon monoxide poisoning. Creosote buildup is the #1 cause of chimney fires."

  your_fireplace_info:
    type: "[FIREPLACE_TYPE]"  # wood-burning, gas, electric, pellet
    chimney_type: "[CHIMNEY_TYPE]"  # masonry, metal flue, direct vent
    damper_location: "[DAMPER_LOCATION]"
    gas_shutoff: "[FIREPLACE_GAS_SHUTOFF]"
    last_inspection: "[LAST_CHIMNEY_INSPECTION_DATE]"

  before_each_use:
    - task: "Open damper fully"
      how: "Lever or handle at [DAMPER_LOCATION] — verify open by looking up flue"
    - task: "Check for obstructions"
      how: "Shine flashlight up flue — look for debris, nests, or blockage"
    - task: "Verify draft"
      how: "Light match near opening — smoke should draw upward"
    - task: "Position fireplace screen"
      purpose: "Prevents sparks from escaping into room"
    - task: "Clear combustibles"
      rule: "Nothing flammable within 3 feet of fireplace opening"

  annual_requirements:
    - task: "Professional chimney inspection"
      when: "Before first use each fall — schedule in August/September"
      includes: "Level 1 inspection, cleaning if needed, damper check"
      cost_range: "$150-300 for inspection, $150-400 for cleaning"
    - task: "Chimney cap inspection"
      check: "Screen intact, cap secure, no rust or damage"
    - task: "Exterior chimney inspection"
      check: "Mortar joints, crown, flashing at roofline"
    - task: "Carbon monoxide detector test"
      location: "[CO_DETECTOR_LOCATIONS]"

  wood_burning_guidelines:
    fuel_selection:
      use: "Seasoned hardwood (oak, maple, ash) — dried 6-12 months"
      avoid:
        - "Green (freshly cut) wood — creates excessive creosote"
        - "Softwoods (pine, cedar) — burn fast, spark heavily"
        - "Treated lumber — toxic fumes"
        - "Painted or stained wood — toxic fumes"
        - "Cardboard, trash, magazines — fire hazard, toxic fumes"
    how_to_tell_seasoned:
      - "Darker color with cracks on ends"
      - "Lightweight compared to green wood"
      - "Sounds hollow when pieces knocked together"
      - "Bark peeling or loose"

  ash_disposal:
    - "1. Let ashes cool for 24-48 hours in fireplace"
    - "2. Scoop into METAL container with tight lid"
    - "3. Add small amount of water to ensure no embers"
    - "4. Store container OUTSIDE, away from house and combustibles"
    - "5. Wait another 48 hours before disposal in trash"
    - "WARNING: Ashes can retain burning embers for days — many house fires start from improper ash disposal"

  gas_fireplace_specific:
    annual_tasks:
      - "Professional inspection of gas valve and connections"
      - "Check pilot light and thermocouple"
      - "Clean glass with approved fireplace glass cleaner"
      - "Inspect artificial logs for damage or deterioration"
      - "Test remote control batteries"
    safety:
      - "Never use if you smell gas — shut off valve, ventilate, call gas company"
      - "Keep glass doors closed during operation — glass gets extremely hot"
      - "Gas shutoff location: [FIREPLACE_GAS_SHUTOFF]"

  warning_signs:
    call_chimney_professional:
      - "Strong odor from fireplace when not in use"
      - "Smoke entering room instead of going up chimney"
      - "Visible creosote flakes falling into firebox"
      - "Stains on ceiling or walls near chimney"
      - "Cracked or damaged flue tiles (visible during inspection)"
      - "White staining on exterior chimney (efflorescence)"
    emergency:
      - "Chimney fire (roaring sound, dense smoke, intense heat)"
      - "Action: Get everyone out, call 911, do NOT put water on fire"

  diy_vs_pro:
    diy_tasks:
      - "Ash removal and disposal"
      - "Cleaning fireplace interior (firebox)"
      - "Testing damper operation"
      - "Visual inspection of chimney cap from ground"
      - "Replacing fireplace screen"
    always_call_pro:
      - "Chimney cleaning/sweeping"
      - "Annual inspection"
      - "Gas line or valve work"
      - "Flue liner repair or replacement"
      - "Crown or cap repair"
      - "Damper repair or replacement"

  regional_note: "Southeast: Shorter burning season means creosote stays moist longer — increases corrosion risk. Annual inspection still essential even with light use. Humidity can cause damper rust — check operation each fall."

  contacts:
    chimney_sweep: "[CHIMNEY_SWEEP_NAME] — [CHIMNEY_SWEEP_PHONE]"
    gas_company: "[GAS_COMPANY] — [GAS_COMPANY_PHONE]"

