septic_system:
  title: "Septic System Care"
  feature: has_septic
  section: 5
  category: systems
  overview: "Septic systems require careful use and regular pumping to avoid costly failures. A well-maintained system lasts 25-30 years; a neglected one can fail in under 10."

  your_system_info:
    tank_location: "[SEPTIC_TANK_LOCATION]"
    tank_size: "[SEPTIC_TANK_SIZE] gallons"
    drain_field_location: "[DRAIN_FIELD_LOCATION]"
    last_pumped: "[LAST_SEPTIC_PUMPING_DATE]"
    pumping_company: "[SEPTIC_COMPANY] — [SEPTIC_PHONE]"
    access_lids: "[SEPTIC_ACCESS_DESCRIPTION]"

  pumping_schedule:
    guideline: "Every 3-5 years depending on household size and tank size"
    factors:
      - "More occupants = pump more frequently"
      - "Garbage disposal use increases solids — pump every 2-3 years"
      - "Water softener backwash adds volume — may need more frequent pumping"
    record_keeping: "Keep pumping receipts — needed for home sale disclosure"

  daily_use_rules:
    flush_only:
      - "Human waste"
      - "Toilet paper (regular, not 'flushable' wipes)"
    never_flush:
      - "Flushable wipes (they don't break down)"
      - "Feminine hygiene products"
      - "Diapers or baby wipes"
      - "Cotton balls, swabs, dental floss"
      - "Cat litter (even 'flushable' types)"
      - "Medications (dispose at pharmacy take-back)"
      - "Grease or cooking oil"
      - "Paints, solvents, chemicals"
      - "Cigarette butts"

  protect_drain_field:
    do:
      - "Keep accurate diagram of drain field location"
      - "Maintain grass cover over field"
      - "Divert surface water away from field"
      - "Mark field boundaries before any excavation"
    do_not:
      - "Drive vehicles over drain field"
      - "Park on drain field"
      - "Build structures over field"
      - "Plant trees or shrubs within 30 feet (roots damage pipes)"
      - "Install sprinklers over field"
      - "Cover with concrete, asphalt, or plastic"

  water_conservation:
    why: "Excessive water overwhelms the system and prevents proper treatment"
    tips:
      - "Fix leaky faucets and running toilets immediately"
      - "Spread laundry loads throughout the week"
      - "Use high-efficiency fixtures (toilets, showerheads)"
      - "Don't drain hot tubs or pools into septic"
      - "Limit garbage disposal use — compost instead"

  warning_signs:
    early_warning:
      - "Slow drains throughout house (not just one fixture)"
      - "Gurgling sounds in plumbing"
      - "Sewage odor inside or outside"
      - "Wet spots or unusually green grass over drain field"
    serious_problems:
      - "Sewage backup in lowest drains"
      - "Standing water over drain field"
      - "System alarm sounding (if equipped)"
      - "Action: Stop using water, call septic professional immediately"

  additives_truth:
    not_recommended: "Most septic additives are unnecessary and some are harmful"
    reason: "Normal bacterial action from waste is sufficient for proper operation"
    harmful: "Chemical additives can kill beneficial bacteria and push solids to drain field"
    exception: "After heavy antibiotic use, a bacterial additive may help restore balance"

  diy_vs_pro:
    diy_tasks:
      - "Water conservation practices"
      - "Monitoring for warning signs"
      - "Maintaining grass over drain field"
      - "Diverting surface water"
      - "Keeping records"
    always_call_pro:
      - "Pumping (required by law in most areas)"
      - "Inspections"
      - "Locating buried tank or field"
      - "Any repairs"
      - "Adding risers for easier access"

  inspection_requirements:
    when_needed:
      - "At home purchase (required by most lenders)"
      - "Every 3 years (recommended)"
      - "Before adding bedrooms or bathrooms"
      - "If warning signs appear"
    what_it_includes:
      - "Locate and uncover tank"
      - "Measure scum and sludge layers"
      - "Check for leaks and structural damage"
      - "Evaluate drain field condition"
      - "Test baffles and outlets"

  regional_note: "Southeast clay soils drain slowly — may require larger drain field or alternative system. High water table areas may need mound system. Heavy rains can temporarily saturate drain field — reduce water use during extended rain."

  contacts:
    septic_service: "[SEPTIC_COMPANY] — [SEPTIC_PHONE]"
    county_health: "[COUNTY_HEALTH_DEPT] — [HEALTH_DEPT_PHONE]"

