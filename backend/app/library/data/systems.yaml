  biannual_maintenance:
    tpr_valve_test:
      what: "Temperature and Pressure Relief valve — critical safety device"
      location: "Side or top of tank"
      how:
        - "1. Place bucket under discharge pipe"
        - "2. Lift lever gently for 5 seconds"
        - "3. Water should flow out"
        - "4. Release — valve should close fully"
      if_fails: "Valve doesn't open OR doesn't close — replace immediately"
      warning: "Water will be HOT — use caution"

  annual_maintenance:
    tank_flush:
      purpose: "Removes sediment that reduces efficiency and causes noise"
      when: "Annually, or more often with hard water"
      steps:
        - "1. Turn off gas/electricity to water heater"
        - "2. Turn off cold water inlet valve"
        - "3. Connect garden hose to drain valve"
        - "4. Run hose to floor drain or outside"
        - "5. Open a hot water faucet upstairs (breaks vacuum)"
        - "6. Open drain valve"
        - "7. Let water flow until clear (may take 5-10 minutes)"
        - "8. Close drain valve"
        - "9. Open cold water inlet to refill tank"
        - "10. Once full, restore power"
      tip: "If water is very cloudy, repeat process"
    anode_rod_check:
      purpose: "Sacrificial rod that prevents tank corrosion"
      frequency: "Check every 2-3 years, replace when depleted"
      sign_of_depletion: "Rod less than 1/2\" diameter or coated heavily"
      diy_challenge: "Requires socket wrench and often significant force"
      pro_recommendation: "Have HVAC tech check during service call"

  temperature_setting:
    recommended: "120°F"
    too_low: "Below 120°F risks Legionella bacteria growth"
    too_high: "Above 140°F risks scalding, wastes energy"
    how_to_adjust:
      gas: "Dial on gas valve — usually labeled"
      electric: "Behind upper and lower panels — requires screwdriver"

