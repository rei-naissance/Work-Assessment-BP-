attic_care:
  title: "Attic Inspection & Insulation"
  feature: has_attic
  section: 5
  category: systems
  overview: "Attic conditions directly impact energy efficiency, roof longevity, and indoor air quality. Proper ventilation and insulation prevent ice dams, moisture damage, and high energy bills."

  your_attic_info:
    access_location: "[ATTIC_ACCESS_LOCATION]"
    insulation_type: "[INSULATION_TYPE]"  # fiberglass batts, blown-in, spray foam
    insulation_depth: "[INSULATION_DEPTH] inches"
    ventilation_type: "[VENTILATION_TYPE]"  # ridge/soffit, gable vents, powered

  safety_first:
    - icon: "⚠️"
      warning: "Walk ONLY on joists or boards laid across joists"
      reason: "Ceiling drywall will not support your weight"
    - icon: "⚠️"
      warning: "Wear N95 mask and long sleeves"
      reason: "Insulation fibers irritate lungs and skin"
    - icon: "⚠️"
      warning: "Use battery-powered light, not work light"
      reason: "Hot bulbs near insulation = fire risk"
    - icon: "⚠️"
      warning: "Summer attics can exceed 140°F"
      action: "Inspect early morning or wait for cooler weather"

  biannual_inspection:
    title: "Check Every 6 Months (Spring & Fall)"
    checklist:
      - item: "Roof sheathing"
        look_for: "Dark stains, mold, daylight through boards, water marks"
        indicates: "Roof leak or condensation problem"
      - item: "Insulation condition"
        look_for: "Compression, gaps, wet spots, displaced areas"
        indicates: "Reduced R-value, possible moisture intrusion"
      - item: "Ventilation"
        check: "Soffit vents unblocked, ridge/gable vents clear"
        indicates: "Blocked vents cause moisture buildup and ice dams"
      - item: "Pest evidence"
        look_for: "Droppings, nesting materials, chew marks, dead insects"
        indicates: "Active infestation requiring treatment"
      - item: "Electrical"
        check: "Junction boxes covered, no damaged wires"
        indicates: "Fire hazard if issues found"
      - item: "HVAC equipment (if present)"
        check: "Ductwork connections tight, no condensation on unit"

  insulation_guidelines:
    recommended_r_value: "R-38 to R-60 for Southeast US (Zone 3-4)"
    depth_equivalents:
      fiberglass_batts: "10-16 inches for R-38 to R-60"
      blown_fiberglass: "13-20 inches for R-38 to R-60"
      blown_cellulose: "10-16 inches for R-38 to R-60"
    common_problems:
      - "Insulation pushed aside for storage — restore coverage"
      - "Insulation blocking soffit vents — install baffles"
      - "Insulation too thin — add more layers"
      - "Insulation compressed — loses R-value, needs replacement"

  ventilation_requirements:
    rule: "1 sq ft of vent area per 150 sq ft of attic floor (or 1:300 with vapor barrier)"
    balance: "Intake (soffit) and exhaust (ridge/gable) should be roughly equal"
    signs_of_poor_ventilation:
      - "Frost or moisture on roof sheathing in winter"
      - "Extremely hot attic in summer (significantly hotter than outside)"
      - "Ice dams forming at roof edge"
      - "Mold or mildew on wood surfaces"
    do_not:
      - "Cover soffit vents with insulation"
      - "Mix powered vents with ridge vents (causes short-circuiting)"
      - "Seal attic completely — ventilation is required"

  diy_vs_pro:
    diy_tasks:
      - "Visual inspections from access point"
      - "Installing soffit baffles"
      - "Adding blown-in insulation (rental equipment available)"
      - "Sealing air leaks around penetrations"
      - "Adding weatherstripping to attic hatch"
    call_pro:
      - "Mold remediation"
      - "Spray foam insulation"
      - "Roof leak repairs"
      - "Adding ventilation (cutting new vents)"
      - "Removing old vermiculite insulation (may contain asbestos)"
      - "Pest removal and exclusion"

  energy_tip: "Air sealing before adding insulation provides biggest bang for buck. Seal around: light fixtures, plumbing penetrations, chimney chase, attic hatch, ductwork boots."

  regional_note: "Southeast: Focus on summer heat management — radiant barrier can reduce cooling costs 5-10%. Less concern about ice dams than northern regions, but attic moisture from humid air is common."

  contacts:
    insulation_contractor: "[INSULATION_COMPANY] — [INSULATION_PHONE]"
    roofer: "[ROOFER_NAME] — [ROOFER_PHONE]"

