      - "Quarterly testing"
      - "Cleaning pump and pit"
      - "Battery replacement"
      - "Float switch adjustment"
      - "Discharge line inspection"
    call_pro:
      - "Pump replacement"
      - "Check valve replacement"
      - "Discharge line repair"
      - "Installing backup system"
      - "Pump runs continuously (diagnosing cause)"

  regional_note: "Southeast: Heavy summer storms can overwhelm pumps. Battery backup essential — storms often cause power outages. Clay soil drains slowly, increasing pump runtime."

  contacts:
