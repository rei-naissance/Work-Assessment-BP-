hot_tub_spa:
  title: "Hot Tub & Spa Maintenance"
  feature: has_hot_tub
  section: 5
  category: systems
  overview: "Hot tubs require diligent water chemistry and equipment maintenance. Warm, still water grows bacteria quickly — proper care is essential for health and equipment longevity."

  your_hot_tub:
    location: "[HOT_TUB_LOCATION]"
    capacity: "[HOT_TUB_GALLONS] gallons"
    sanitizer: "[HOT_TUB_SANITIZER]"  # chlorine, bromine, salt
    equipment_access: "[HOT_TUB_EQUIPMENT_LOCATION]"
    cover_type: "[HOT_TUB_COVER_TYPE]"
    gfci_location: "[HOT_TUB_GFCI_LOCATION]"

  twice_weekly:
    water_testing:
      - test: "pH"
        ideal: "7.2 - 7.8"
        too_low: "Corrosive to equipment, skin irritation"
        too_high: "Reduces sanitizer effectiveness, cloudy water"
      - test: "Sanitizer (chlorine or bromine)"
        chlorine_ideal: "1-3 ppm"
        bromine_ideal: "3-5 ppm"
        too_low: "Bacteria growth, algae"
        too_high: "Skin and eye irritation"
      - test: "Alkalinity"
        ideal: "80-120 ppm"
        purpose: "Stabilizes pH"
    visual_check:
      - "Water clarity — should be crystal clear"
      - "Foam level — excessive foam indicates buildup"
      - "Cover condition — no sagging or waterlogging"

  weekly_tasks:
    - task: "Shock treatment"
      why: "Oxidizes contaminants, reactivates sanitizer"
      when: "After heavy use or weekly minimum"
      how: "Add shock per product directions, run jets, wait before using"
    - task: "Clean waterline"
      how: "Wipe with approved spa cleaner and cloth"
    - task: "Rinse filter cartridge"
      how: "Remove, spray with hose"
    - task: "Check water level"
      maintain: "Mid-skimmer level"

  monthly_tasks:
    - task: "Deep clean filter"
      how: "Soak overnight in filter cleaner solution, rinse thoroughly"
    - task: "Inspect cover"
      check: "Tears, waterlogging, sagging, broken straps"
    - task: "Check jets"
      verify: "All jets functional, none stuck"
    - task: "Inspect cabinet/skirting"
      look_for: "Pest entry, rot, damage"

  quarterly_tasks:
    drain_and_refill:
      frequency: "Every 3-4 months (sooner with heavy use)"
      steps:
        - "1. Turn off power at breaker"
        - "2. Drain water (use drain valve or submersible pump)"
        - "3. Clean shell with spa cleaner"
        - "4. Flush plumbing with line cleaner"
        - "5. Rinse thoroughly"
        - "6. Refill with fresh water"
        - "7. Balance chemicals before heating"
        - "8. Restore power"
    filter_replacement:
      frequency: "Every 1-2 years (or sooner if damaged)"

  chemical_safety:
    - "NEVER mix different chemicals"
    - "Add chemicals to water, never water to chemicals"
    - "Store chemicals in cool, dry place"
    - "Keep chlorine and bromine separated"
    - "Shower before and after using hot tub"
    - "Don't use hot tub if water is cloudy"

  troubleshooting:
    cloudy_water:
      causes: "Low sanitizer, high pH, dirty filter, old water"
      fix: "Check chemistry, clean filter, consider drain and refill"
    foamy_water:
      causes: "Body oils, lotions, soap residue, low calcium"
      fix: "Shock, use enzyme cleaner, encourage showering before use"
    green_water:
      causes: "Algae growth — low sanitizer"
      fix: "Shock heavily, scrub, clean filter, may need drain"
    smelly_water:
      causes: "Bacteria, biofilm"
      fix: "Drain, flush lines with cleaner, refill, rebalance"
    heater_not_working:
      check: "Thermostat setting, water level, filter cleanliness, breaker"
      call_pro_if: "All checks pass but no heat"

  winterizing:
    if_not_using:
      - "Drain completely (including pumps and lines)"
      - "Blow out remaining water with shop vac"
      - "Add antifreeze to any water that can't be removed"
      - "Clean and store cover"
    if_keeping_running:
      - "Continue regular maintenance"
      - "Monitor more frequently in cold weather"
      - "Keep cover closed to retain heat"
      - "Check for ice damage"

  diy_vs_pro:
    diy_tasks:
      - "Water testing and chemical adjustments"
      - "Filter cleaning and replacement"
      - "Draining and refilling"
      - "Shell cleaning"
      - "Cover care"
    call_pro:
      - "Heater issues"
      - "Pump problems"
      - "Electrical issues"
      - "Plumbing leaks"
      - "Control panel errors"

  contacts:
    hot_tub_service: "[HOT_TUB_SERVICE] — [HOT_TUB_SERVICE_PHONE]"
    supply_store: "[HOT_TUB_SUPPLY_STORE]"

