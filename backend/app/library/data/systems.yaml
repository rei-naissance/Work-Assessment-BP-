      - "20-amp circuit: ~1,920 watts"
    high_draw_appliances:
      - "Space heater: 1,500 watts"
      - "Hair dryer: 1,200-1,875 watts"
      - "Microwave: 600-1,200 watts"
      - "Toaster: 800-1,400 watts"
    rule: "Keep total load under 80% of circuit capacity"

  diy_vs_pro:
