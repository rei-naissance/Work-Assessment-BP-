home_inventory:
  title: "Home Inventory & Documentation"
  category: maintenance
  section: 5
  overview: "Maintain accurate records for insurance, maintenance, and emergency reference."

  why_it_matters:
    - "Insurance claims require proof of ownership and value"
    - "Maintenance tracking prevents missed service"
    - "Emergency responders benefit from utility info"
    - "Future home sale requires documentation"

  documentation_checklist:
    property_documents:
      keep_original:
        - "Deed"
        - "Survey"
        - "Title insurance policy"
        - "HOA documents and covenants"
      keep_copies:
        - "Mortgage documents"
        - "Property tax records"
        - "Permits for improvements"
    system_records:
      for_each_major_system:
        - "Make/model/serial number"
        - "Installation date"
        - "Warranty information"
        - "Service history"
        - "User manuals"
      systems_to_document:
        - "HVAC (indoor and outdoor units)"
        - "Water heater"
        - "Electrical panel"
        - "Plumbing fixtures"
        - "Appliances"
        - "Roofing"
        - "Windows"
    improvement_records:
      - "Contractor name and contact"
      - "Date completed"
      - "Cost"
      - "Permits obtained"
      - "Before/after photos"
      - "Warranty information"

  visual_documentation:
    room_by_room:
      - "Walk through each room with video"
      - "Open closets and cabinets"
      - "Capture serial numbers and model info"
      - "Narrate estimated values"
    high_value_items:
      - "Individual photos with detail"
      - "Receipts or appraisals"
      - "Serial numbers recorded"
    schedule: "Update annually or after major purchases"
    storage: "Store copy offsite or in cloud (not only in house)"

  maintenance_log:
    what_to_track:
      - "Date of service"
      - "What was done"
      - "Who did the work (DIY or contractor)"
      - "Cost"
      - "Next service due"
    benefits:
      - "Proves maintenance for warranty claims"
      - "Identifies recurring issues"
      - "Helps budget for future repairs"
      - "Valuable for home sale disclosure"

  emergency_reference:
    post_visibly:
      - "Utility shutoff locations"
      - "Emergency contacts"
      - "Alarm codes (secured location)"
      - "WiFi password (for guests)"
    share_with:
      - "Household members"
      - "House sitters"
      - "Trusted neighbor"
