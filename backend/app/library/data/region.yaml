# =============================================================================
# SOUTHEAST REGION (Primary Focus: Charlotte, NC area)
# =============================================================================

southeast_hurricane:
  title: "Hurricane & Tropical Storm Preparedness"
  region: southeast
  section: 5
  category: regional
  overview: "Hurricane season runs June 1 - November 30. Even inland areas like Charlotte can experience damaging winds, flooding, and power outages from tropical systems."

  hurricane_season:
    dates: "June 1 - November 30"
    peak_months: "August - October"
    monitoring: "NOAA National Hurricane Center: hurricanes.gov"

  before_season:
    title: "Pre-Season Preparation (May)"
    home_exterior:
      - "Trim trees and remove dead branches that could become projectiles"
      - "Secure or store outdoor furniture, grills, and decorations"
      - "Inspect and repair roof — loose shingles become dangerous in high wind"
      - "Clear gutters and downspouts for heavy rain"
      - "Check garage door reinforcement — weakest point in many homes"
      - "Photograph home exterior and contents for insurance documentation"
    equipment:
      - "Test generator and stock fuel with stabilizer"
      - "Inspect hurricane shutters or have plywood pre-cut for windows"
      - "Test sump pump and battery backup"
      - "Ensure portable phone chargers are charged"

  supply_kit:
    title: "72-Hour Emergency Supply Kit"
    water: "1 gallon per person per day x 3 days minimum"
    food:
      - "Non-perishable food (canned goods, granola bars, peanut butter)"
      - "Manual can opener"
      - "Baby food/formula if needed"
      - "Pet food if applicable"
    supplies:
      - "Flashlights (multiple) and extra batteries"
      - "Battery or crank-powered radio"
      - "First aid kit"
      - "Prescription medications (7-day supply)"
      - "Cash in small bills (ATMs won't work)"
      - "Important documents in waterproof container"
      - "Phone chargers (car and battery pack)"
      - "Full tank of gas in vehicle"
    storage_location: "[EMERGENCY_KIT_LOCATION]"

  when_storm_threatens:
    48_hours_out:
      - "Monitor NHC and local news for updates"
      - "Top off vehicle gas tanks"
      - "Get cash from ATM"
      - "Charge all devices"
      - "Fill prescriptions"
      - "Know your evacuation zone: [EVACUATION_ZONE]"
    24_hours_out:
      - "Install hurricane shutters or board windows"
      - "Bring in outdoor items or secure firmly"
      - "Fill bathtub with water (toilet flushing if water fails)"
      - "Review insurance policy and document location"
      - "Confirm evacuation route if in mandatory zone"
    just_before:
      - "Turn refrigerator/freezer to coldest setting"
      - "Unplug sensitive electronics"
      - "Locate emergency kit and supplies"
      - "Know how to shut off utilities if needed"

  during_storm:
    - "Stay indoors away from windows"
    - "Monitor weather radio for updates"
    - "Do NOT go outside during eye passage — storm returns from opposite direction"
    - "If flooding threatens, move to upper floor"
    - "Do NOT use candles — fire risk during emergency"
    - "Preserve phone battery — text instead of call"

  after_storm:
    immediate:
      - "Wait for all-clear before going outside"
      - "Watch for downed power lines — assume all are live"
      - "Check on neighbors, especially elderly"
      - "Document damage with photos/video before cleanup"
      - "Wear closed shoes — debris and nails"
    power_outage:
      - "Keep refrigerator closed — food safe 4 hours"
      - "Keep freezer closed — food safe 24-48 hours"
      - "Run generator OUTSIDE only, 20+ feet from house"
      - "Report outage to utility: [POWER_COMPANY_PHONE]"
    insurance:
      - "Call insurance to report damage: [INSURANCE_CLAIM_PHONE]"
      - "Don't make permanent repairs until adjuster visits"
      - "Get contractor estimates in writing"
      - "Keep all receipts for temporary repairs and expenses"

  evacuation_info:
    zone: "[EVACUATION_ZONE]"
    route: "[EVACUATION_ROUTE]"
    destination: "[EVACUATION_DESTINATION]"
    pet_plan: "[PET_EVACUATION_PLAN]"
    shelter_info: "Check Mecklenburg County Emergency Management for shelter locations"

  contacts:
    emergency: "911"
    power_company: "[POWER_COMPANY] — [POWER_COMPANY_PHONE]"
    insurance: "[INSURANCE_PROVIDER] — [INSURANCE_CLAIM_PHONE]"
    county_emergency: "Mecklenburg Emergency Management: 311 or 704-336-7600"

# -----------------------------------------------------------------------------

southeast_humidity:
  title: "Humidity & Moisture Control"
  region: southeast
  section: 5
  category: regional
  overview: "Southeast humidity (often 70-90% outdoors) creates year-round moisture challenges. Controlling indoor humidity prevents mold, wood damage, and HVAC problems."

  target_humidity:
    ideal_range: "30-50% relative humidity indoors"
    problems_above_50:
      - "Mold and mildew growth"
      - "Dust mite proliferation"
      - "Wood swelling (doors stick, floors cup)"
      - "Musty odors"
      - "Condensation on windows"
    problems_below_30:
      - "Static electricity"
      - "Dry skin and respiratory irritation"
      - "Wood cracking and splitting"

  high_humidity_months: "March through October (worst: June-September)"

  dehumidifier_use:
    when_needed:
      - "Basements and crawl spaces year-round"
      - "Any room consistently above 50% RH"
      - "After water damage or flooding"
    sizing:
      - "Basement 500 sq ft: 30-pint unit"
      - "Basement 1000 sq ft: 50-pint unit"
      - "Basement 1500+ sq ft: 70-pint unit or multiple units"
    maintenance:
      - "Empty reservoir daily or connect continuous drain"
      - "Clean filter every 2 weeks"
      - "Clean water tank monthly to prevent mold"
      - "Replace unit every 5-10 years"

  hvac_humidity_control:
    - "Properly sized AC removes humidity while cooling"
    - "Oversized AC short-cycles — cools but doesn't dehumidify"
    - "Consider whole-house dehumidifier integrated with HVAC"
    - "Don't close too many vents — disrupts air flow"
    - "Change filters every 30-60 days in humid months"

  problem_areas:
    bathrooms:
      - "Run exhaust fan during and 20 minutes after shower"
      - "Ensure fan vents to exterior, not attic"
      - "Squeegee shower walls after use"
      - "Leave door open after showering if possible"
    kitchens:
      - "Use range hood when cooking, especially boiling"
      - "Vent to exterior, not recirculating"
    laundry:
      - "Vent dryer to exterior"
      - "Don't hang dry clothes indoors"
    basement_crawl:
      - "Run dehumidifier continuously"
      - "Encapsulate crawl space with vapor barrier"
      - "Ensure proper drainage away from foundation"

  moisture_warning_signs:
    - "Condensation on windows"
    - "Musty odors anywhere in home"
    - "Damp feeling to clothing or bedding"
    - "Peeling wallpaper or bubbling paint"
    - "Visible mold on walls, ceilings, or in closets"
    - "Warped wood floors or sticking doors"

  seasonal_tips:
    spring_summer:
      - "Keep windows closed on humid days"
      - "Run AC even if not hot — removes humidity"
      - "Don't leave wet towels on floors"
      - "Check under sinks for condensation"
    fall_winter:
      - "Humidity drops naturally — may need less dehumidification"
      - "Monitor for condensation when heat runs"
      - "Continue basement dehumidifier year-round"

  equipment:
    hygrometer_location: "[HYGROMETER_LOCATION]"
    dehumidifier_location: "[DEHUMIDIFIER_LOCATION]"
    hvac_service: "[HVAC_COMPANY] — [HVAC_PHONE]"

