southeast_mold_prevention:
  title: "Mold Prevention & Remediation"
  region: southeast
  section: 5
  category: regional
  overview: "Southeast humidity creates ideal mold conditions. Mold can start growing within 24-48 hours of water exposure. Prevention and quick response are critical."

  conditions_for_mold:
    - "Moisture source (humidity, leak, condensation)"
    - "Organic material (wood, drywall, fabric, dust)"
    - "Temperature 60-80°F (typical home range)"
    - "Darkness (mold grows faster in dark)"
    - "Timeline: Visible mold can appear 24-48 hours after water exposure"

  prevention_strategies:
    humidity_control:
      - "Keep indoor humidity below 50%"
      - "Use dehumidifier in basement and crawl space"
      - "Run exhaust fans during and after bathing/cooking"
      - "Vent dryer to outside"
    water_management:
      - "Fix leaks within 24 hours"
      - "Dry wet materials within 48 hours"
      - "Improve drainage around foundation"
      - "Keep gutters clean and directing water away"
    air_circulation:
      - "Don't push furniture tight against exterior walls"
      - "Leave closet doors ajar periodically"
      - "Run HVAC fan on 'circulate' mode"
      - "Ensure adequate ventilation in all rooms"
    building_materials:
      - "Use mold-resistant drywall in bathrooms"
      - "Apply mold-resistant paint in high-humidity areas"
      - "Choose tile or vinyl over carpet in bathrooms/basements"

  high_risk_areas:
    check_regularly:
      - "Behind furniture against exterior walls"
      - "Under sinks (kitchen, bathroom)"
      - "Around windows and doors"
      - "In bathroom corners and ceiling"
      - "Basement walls and floors"
      - "Crawl space"
      - "HVAC drip pan and drain line"
      - "Washing machine gasket (front-loaders)"
      - "Attic (near roof penetrations)"

  mold_identification:
    colors: "Black, green, white, orange, or pink"
    texture: "Fuzzy, slimy, or powdery"
    smell: "Musty, earthy odor (even if mold not visible)"
    health_signs: "Respiratory symptoms, allergies that worsen at home"

  small_mold_cleanup:
    conditions: "Less than 10 square feet, non-porous surface, no health concerns"
    supplies:
      - "N95 mask"
      - "Rubber gloves"
      - "Goggles (no vents)"
      - "Detergent solution or commercial mold cleaner"
      - "Scrub brush"
      - "Trash bags"
    steps:
      - "1. Contain area — close doors, don't spread spores"
      - "2. Fix moisture source FIRST"
      - "3. Scrub mold with detergent solution"
      - "4. Rinse and dry completely"
      - "5. Bag and dispose of cleaning materials"
      - "6. Run dehumidifier and fans to dry area"
    do_not:
      - "Use bleach on porous surfaces (doesn't penetrate)"
      - "Paint over mold"
      - "Dry sweep or vacuum visible mold"

  call_professional_when:
    - "Mold covers more than 10 square feet"
    - "Mold is in HVAC system"
    - "Mold resulted from contaminated water (sewage, flood)"
    - "Mold is in difficult access areas (inside walls)"
    - "Anyone in household has respiratory conditions"
    - "Mold keeps returning after cleanup"

  after_water_damage:
    timeline: "Act within 24-48 hours to prevent mold"
    steps:
      - "1. Stop water source"
      - "2. Extract standing water (wet-dry vac, pumps)"
      - "3. Remove wet materials (carpet padding, insulation)"
      - "4. Set up fans and dehumidifiers"
      - "5. Open windows if humidity is lower outside"
      - "6. Monitor for mold development over next week"
    professional_drying: "Required for large areas or water in wall cavities"

  contacts:
    mold_remediation: "[MOLD_REMEDIATION_COMPANY] — [MOLD_PHONE]"
    water_damage_restoration: "[RESTORATION_COMPANY] — [RESTORATION_PHONE]"

