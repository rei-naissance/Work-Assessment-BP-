southeast_energy_cooling:
  title: "Energy-Efficient Cooling"
  region: southeast
  section: 5
  category: regional
  overview: "Cooling accounts for 40-50% of summer energy bills in the Southeast. Strategic improvements and smart habits can significantly reduce costs while staying comfortable."

  cooling_season: "April - October (7+ months)"

  thermostat_settings:
    recommended:
      when_home: "78°F"
      when_away: "85°F or off"
      when_sleeping: "78-80°F with ceiling fan"
    every_degree_matters: "Each degree lower than 78°F increases cooling costs ~3%"
    smart_thermostat: "Can save 10-15% on cooling with proper programming"

  hvac_optimization:
    filter_changes:
      frequency: "Every 30-60 days during cooling season"
      why: "Dirty filter restricts airflow, reduces efficiency, strains system"
    professional_maintenance:
      frequency: "Annually in spring"
      includes: "Coil cleaning, refrigerant check, electrical inspection"
      cost: "$75-200"
    ductwork:
      - "Seal leaks with mastic or foil tape (not duct tape)"
      - "Insulate ducts in unconditioned spaces (attic, crawl)"
      - "Duct leaks can waste 20-30% of cooled air"
    sizing_matters: "Oversized AC short-cycles — cools but doesn't dehumidify"

  passive_cooling:
    window_management:
      - "Close blinds/curtains on south and west windows during afternoon"
      - "Use solar film or reflective shades"
      - "Consider awnings on sun-exposed windows"
    ceiling_fans:
      - "Run counterclockwise in summer (pushes air down)"
      - "Allows raising thermostat 4°F without comfort loss"
      - "Turn OFF when room is unoccupied — fans cool people, not rooms"
    heat_reduction:
      - "Use microwave or outdoor grill instead of oven"
      - "Run dishwasher at night"
      - "Use LED bulbs (generate less heat)"
      - "Unplug electronics and chargers when not in use"

  insulation_and_sealing:
    attic:
      - "R-38 to R-60 recommended for Southeast"
      - "Radiant barrier can reduce attic heat gain 25%"
      - "Seal air leaks before adding insulation"
    air_sealing:
      - "Seal gaps around windows and doors"
      - "Caulk around electrical outlets and switches"
      - "Seal ductwork connections"
    impact: "Air sealing + insulation can reduce cooling costs 15-30%"

  upgrade_considerations:
    when_replacing_ac:
      - "Choose SEER 16+ for efficiency (minimum code may be lower)"
      - "Variable-speed units maintain better humidity control"
      - "Heat pump provides efficient heating AND cooling"
    dehumidification:
      - "Consider whole-house dehumidifier for better comfort"
      - "Allows higher thermostat setting at same comfort level"

  utility_programs:
    - "Check for time-of-use rates — shift usage to off-peak"
    - "Many utilities offer free energy audits"
    - "Rebates may be available for efficient equipment"
    - "Contact your utility: [POWER_COMPANY] — [POWER_COMPANY_PHONE]"

  monthly_tracking:
    - "Compare bills year-over-year (not month-to-month)"
    - "Monitor kWh usage, not just dollar amount"
    - "Sudden increase may indicate system problem"

