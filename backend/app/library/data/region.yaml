northeast_winter:
  title: "Northeast Winter Preparedness"
  region: northeast
  section: 5
  category: regional
  overview: "Northeast winters bring freezing temperatures, heavy snow, and ice storms. Preparation prevents frozen pipes, ice dams, and heating emergencies."

  before_winter:
    exterior:
      - "Clean gutters — clogged gutters cause ice dams"
      - "Inspect roof for missing/damaged shingles"
      - "Seal gaps around doors, windows, and penetrations"
      - "Insulate exposed pipes in unheated areas"
      - "Disconnect and drain outdoor hoses"
      - "Shut off and drain outdoor faucet supply lines"
      - "Service snow blower or stock ice melt"
    interior:
      - "Schedule furnace maintenance"
      - "Replace furnace filter"
      - "Test heating system before cold weather"
      - "Reverse ceiling fans (clockwise, low speed)"
      - "Apply window insulation film where needed"
      - "Stock emergency supplies (see kit list)"

  freeze_prevention:
    critical_temperatures: "Below 20°F requires active prevention"
    pipe_protection:
      - "Open cabinet doors under sinks on exterior walls"
      - "Let faucets drip during extreme cold"
      - "Maintain thermostat at 55°F minimum when away"
      - "Insulate pipes with foam sleeves"
      - "Know main shutoff location: [WATER_SHUTOFF_LOCATION]"
    if_pipes_freeze:
      - "Keep faucet open while thawing"
      - "Apply gentle heat (hair dryer, heat lamp, towels)"
      - "NEVER use open flame"
      - "If pipe bursts, shut off main and call plumber"

  snow_and_ice:
    snow_removal:
      - "Clear snow promptly — easier before compacting"
      - "Clear path from foundation (prevent melt intrusion)"
      - "Remove snow from window wells"
    ice_melt:
      - "Use sparingly on concrete less than 2 years old"
      - "Calcium chloride is gentler than rock salt"
      - "Sweep up excess after ice melts"
    roof_snow:
      - "Remove if accumulation exceeds 2 feet"
      - "Use roof rake from ground — don't climb on icy roof"
      - "Focus on eaves where ice dams form"

  emergency_kit:
    - "Flashlights and batteries"
    - "Battery or crank radio"
    - "Extra blankets"
    - "Non-perishable food (3 days)"
    - "Water (1 gallon/person/day)"
    - "First aid kit"
    - "Prescription medications"
    - "Car charger for phone"
    - "Cash (ATMs may not work)"

  heating_safety:
    - "Keep flammables away from heating equipment"
    - "Test smoke and CO detectors"
    - "Never use oven or stove for heating"
    - "Have chimney inspected before use"
    - "Generator: outside only, 20+ feet from house"

# -----------------------------------------------------------------------------

northeast_pests:
  title: "Northeast Pest Prevention"
  region: northeast
  section: 5
  category: regional
  overview: "Cold winters drive pests indoors seeking warmth. Fall prevention is key to avoiding winter infestations. Termites and carpenter ants cause structural damage."

  fall_prevention:
    seal_entry_points:
      - "Foundation cracks and gaps"
      - "Gaps around utility pipes and wires"
      - "Space under doors (install sweeps)"
      - "Damaged screens and weatherstripping"
      - "Gaps where siding meets foundation"
    reduce_attraction:
      - "Store firewood 20+ feet from house, off ground"
      - "Keep gutters clean"
      - "Trim vegetation away from foundation"
      - "Remove leaf litter near foundation"

  key_pests:
    mice:
      - "Can enter through 1/4-inch gap"
      - "Seal all gaps with steel wool + caulk"
      - "Store food in sealed containers"
      - "Set traps along walls (they follow edges)"
    carpenter_ants:
      - "Attracted to damp, damaged wood"
      - "Fix moisture problems first"
      - "Look for sawdust piles"
      - "Professional treatment often needed"
    termites:
      - "Schedule annual inspection (spring)"
      - "Watch for swarmers (flying termites)"
      - "Mud tubes indicate subterranean termites"
      - "Keep soil away from wood siding"
    stink_bugs:
      - "Seal entry points before fall"
      - "Vacuum up (don't crush — causes odor)"
      - "They don't cause damage — nuisance only"

  pest_service: "[PEST_CONTROL_COMPANY] — [PEST_CONTROL_PHONE]"

# -----------------------------------------------------------------------------

northeast_ice_dam_roof:
  title: "Ice Dam & Roof Protection"
  region: northeast
  section: 5
  category: regional
  overview: "Ice dams form when heat escapes through the roof, melting snow that refreezes at the eave. Water backs up under shingles, causing leaks and damage."

  how_ice_dams_form:
    - "1. Heat escapes from living space into attic"
    - "2. Warm attic melts snow on upper roof"
    - "3. Meltwater runs down to cold eave"
    - "4. Water refreezes, forming ice dam"
    - "5. More melt backs up behind dam"
    - "6. Water finds its way under shingles into home"

  prevention:
    insulation:
      - "Attic floor should have R-49 or higher"
      - "Insulation should be even — no thin spots"
      - "Don't compress insulation — reduces effectiveness"
    air_sealing:
      - "Seal around light fixtures penetrating attic floor"
      - "Seal plumbing and electrical penetrations"
      - "Seal attic hatch with weatherstripping"
      - "Seal around chimney chase"
    ventilation:
      - "Balance intake (soffit) and exhaust (ridge/gable)"
      - "Don't block soffit vents with insulation — use baffles"
      - "Adequate ventilation keeps attic cold"

  if_ice_dam_forms:
    immediate:
      - "Create channels with calcium chloride in nylon stocking"
      - "DO NOT chip ice — damages shingles"
      - "Remove snow from roof with roof rake"
      - "DO NOT use heat cables as permanent solution"
    professional:
      - "Steam removal by professional roofer"
      - "Address underlying insulation/ventilation issues"

  ice_shield:
    - "Self-adhering membrane installed under shingles at eaves"
    - "Should extend 3+ feet past exterior wall line"
    - "Required by code in most Northeast areas"
    - "Installed during roofing — not retrofit"

# -----------------------------------------------------------------------------

northeast_energy_efficiency:
  title: "Northeast Energy Efficiency"
  region: northeast
  section: 5
  category: regional
  overview: "Long heating season makes efficiency upgrades highly cost-effective. Focus on air sealing and insulation first — they provide the best return on investment."

  priority_order:
    - "1. Air sealing (biggest impact per dollar)"
    - "2. Attic insulation"
    - "3. Basement/crawl space insulation"
    - "4. Window and door weatherstripping"
    - "5. HVAC system upgrade"

  air_sealing:
    biggest_leaks:
      - "Attic bypasses (gaps around chimneys, plumbing stacks)"
      - "Recessed lights penetrating attic"
      - "Attic hatch or pull-down stairs"
      - "Rim joist in basement"
      - "Around windows and doors"
    materials:
      - "Caulk for gaps under 1/4 inch"
      - "Foam sealant for gaps 1/4 to 3 inches"
      - "Rigid foam for larger openings"

  insulation_levels:
    attic: "R-49 to R-60"
    walls: "R-13 to R-23 (depends on wall thickness)"
    basement_walls: "R-10 to R-19"
    crawl_space: "R-25 under floor or R-10 on walls"

  heating_system:
    - "Replace furnaces older than 15 years"
    - "High-efficiency furnaces: 95%+ AFUE"
    - "Consider heat pump for moderate climates"
    - "Cold-climate heat pumps work to -15°F"
    - "Annual maintenance extends life and efficiency"

  windows_and_doors:
    - "Weatherstrip all exterior doors"
    - "Apply window insulation film for single-pane"
    - "Consider replacement if single-pane or failing"
    - "Double or triple-pane low-E for new windows"

  energy_audit:
    - "Professional audit identifies biggest opportunities"
    - "Often includes blower door test for air leaks"
    - "Many utilities offer free or subsidized audits"

# -----------------------------------------------------------------------------

northeast_coastal_flooding:
  title: "Coastal Flooding Preparedness"
  region: northeast
  section: 5
