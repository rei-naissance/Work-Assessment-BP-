southeast_pests:
  title: "Southeast Pest Prevention & Control"
  region: southeast
  section: 5
  category: regional
  overview: "Warm, humid climate supports year-round pest activity. Termites, mosquitoes, roaches, and fire ants are particular concerns. Prevention is more effective than treatment."

  termites:
    threat_level: "HIGH — Southeast has among the highest termite pressure in the US"
    types:
      subterranean: "Most common — build mud tubes from soil to wood"
      drywood: "Less common — live entirely in wood, no soil contact needed"
    prevention:
      - "Keep mulch at least 12 inches from foundation"
      - "Fix any wood-to-soil contact"
      - "Eliminate moisture sources near foundation"
      - "Keep gutters clean and directing water away"
      - "Don't stack firewood against house"
    inspection:
      frequency: "Annually — preferably spring"
      what_they_check: "Foundation, basement, crawl space, attached structures"
      cost: "$75-150 for inspection"
    warning_signs:
      - "Mud tubes on foundation or walls"
      - "Hollow-sounding wood"
      - "Swarmers (winged termites) inside home — usually spring"
      - "Frass (wood-colored droppings) from drywood termites"
    treatment_options:
      - "Liquid barrier treatment (5-10 year protection)"
      - "Baiting system (ongoing monitoring)"
      - "Tent fumigation (drywood termites)"
    termite_bond: "[TERMITE_BOND_INFO]"
    pest_company: "[PEST_CONTROL_COMPANY] — [PEST_CONTROL_PHONE]"

  mosquitoes:
    peak_season: "April - October"
    breeding_prevention:
      - "Eliminate ALL standing water weekly"
      - "Check: bird baths, plant saucers, gutters, tires, buckets"
      - "Change pet water daily"
      - "Keep pools chlorinated and circulating"
      - "Clear clogged drains and French drains"
    personal_protection:
      - "Use EPA-registered repellents (DEET, Picaridin, Oil of Lemon Eucalyptus)"
      - "Wear long sleeves/pants at dusk and dawn"
      - "Ensure window screens are intact"
    yard_treatment:
      - "Mosquito yard spray (temporary, 2-3 weeks)"
      - "Mosquito misting systems"
      - "Professional barrier treatment"

  roaches:
    common_types:
      american: "Large (1-2\"), reddish-brown, often from outdoors"
      german: "Small (1/2\"), tan, indoor infestation indicates problem"
    prevention:
      - "Seal gaps around pipes, utility entries, doors"
      - "Fix water leaks — roaches need moisture"
      - "Don't leave food out overnight"
      - "Empty garbage regularly"
      - "Keep kitchens and bathrooms clean"
    treatment:
      - "Bait stations and gel baits (most effective)"
      - "Professional treatment if infestation persists"
      - "Avoid spray-only approaches — drives them into walls"

  fire_ants:
    threat: "Aggressive, painful stings — dangerous to allergic individuals"
    identification: "Mounds in lawn, disturbing causes swarm"
    treatment:
      - "Individual mound treatment with bait or drench"
      - "Broadcast bait application for yard-wide control"
      - "Professional treatment for persistent problems"
    warning: "Don't disturb mound — causes aggressive swarming"

  wildlife:
    common: "Squirrels, raccoons, bats, snakes"
    prevention:
      - "Seal gaps in soffits, vents, and roof line"
      - "Use chimney cap with screen"
      - "Trim tree branches away from roof (10 feet)"
      - "Secure trash containers"
    if_found: "Call licensed wildlife removal — DIY often illegal and dangerous"

  integrated_pest_management:
    approach:
      - "Seal entry points (exclusion)"
      - "Remove food and water sources (sanitation)"
      - "Reduce hiding spots (habitat modification)"
      - "Targeted treatment when needed (minimum effective approach)"
    quarterly_service: "Recommended for Southeast — maintains barrier and catches problems early"

  contacts:
    pest_control: "[PEST_CONTROL_COMPANY] — [PEST_CONTROL_PHONE]"
    wildlife_removal: "[WILDLIFE_REMOVAL_COMPANY] — [WILDLIFE_PHONE]"

